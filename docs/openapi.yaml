            Задание Заказчика по которому создан исходящий документ. 
            Используется только для следующих типов документов:
            * <button popovertarget="popdoc43" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Начата приемка товаров по заданию на оприходование (goods_supply_start)</button> 
            * <button popovertarget="popdoc9" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Товары оприходованы (goods_supply)</button> 
            * <button popovertarget="popdoc19" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Возврат товаров со склада длительного хранения (goods_from_long_storage)</button> 
            * <button popovertarget="popdoc25" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Товары пееремещены на склад длительного хранения (goods_to_long_storage)</button> 
            * <button popovertarget="popdoc44" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Начат подбор товаров по заданию на отгрузку (goods_shipment_start)</button> 
            * <button popovertarget="popdoc20" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Подобран товар для отгрузки (goods_shipment_ready)</button> 
            * <button popovertarget="popdoc10" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Товары отгружены (goods_shipment)</button> 
            * <button popovertarget="popdoc40" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Получены заказы (orders_receiving)</button>
          title: Связанный входящий документ Заказчика
        part_num:
          type: integer
          format: int32
          title: Номер частичной приемки или отгрузки
