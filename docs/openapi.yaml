      summary: Получить список неизвестных отправлений для пересылки
      description: |-
        
        ## post /forward/unrecognized      
        
        см. [Пересылка отправлений](#mail_forward_desc)
      parameters: []
      responses:
        '200':
          description: |-
            The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                    title: Признак успешного запроса
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        good_id:
                          type: string
                          maxLength: 255
                          description: |-
                            Код товара присвоенный **Исполнителем** отправлению для пересылки.
                            Используется для организации складского учета поступивших отправлений.
                          title: Код товара
                        descrip:
                          type: string
                          description: |-
                            Описание делается Исполнителем в момент получения неизвестного отправления для пересылки.
                            После получения заказа для конечного получателя, в описании указывается номер заказа и ФИО клиента
                          title: Описание поступившего отправления
                        barcodes:
                          type: array
                          items:
                            type: string
                          description: |-
                            При получении неизвестного отправления, Исполнитель указывает **все** штрихкоды на отправлении
                            которые могут быть использованы для его идентификации.  

                            Заказчик может использовать **любой** из этих штрикодов в атрибуте `orders.forwarded_parcels.barcode` 
                            при создании заказа.
                          title: Штрихкоды неизвестного отправления
                        date:
                          allOf:
                            - $ref: '#/components/schemas/datetime'
                          title: Дата поступления отправления для пересылки на склад Исполнителя
                        order_id:
                          type: string
                          title: Номер заказа в системе Заказчика
                          description: |-
                            Заказ для конечного получателя содержащий отправление для пересылки
                        weight:
                          type: integer
                          format: int32
                          title: Вес отправления, граммы
                        length:
                          type: integer
                          format: int32
                          title: Длина отправления, миллиметры
                        width:
                          type: integer
                          format: int32
                          title: Ширина отправления, миллиметры
                        height:
                          type: integer
                          format: int32
                          title: Высота отправления, миллиметры
                        photos:
                          type: array
                          items:
                            type: object
                            properties:
                              photo_id:
                                type: integer
                                format: int32
                                title: Уникальный идентификатор фото
                              url:
                                type: string
                                title: Url для загрузки фото
                              created_at:
                                allOf:
                                  - $ref: '#/components/schemas/datetime'
                                title: Дата создания фото
                              descrip:
                                type: string
                                title: Примечание к фото
                            required:
                              - photo_id
                              - url
                              - created_at
                          description: |-
                            При получении неизвестного отправления, Исполнитель делает фото общего вида отправления, 
                            а также детальные фото всех этикеток которыми отмаркировано отправление.
                          title: Фото неизвестного отправления
                      required:
                        - good_id
                        - descrip
                        - barcodes
                        - date
                    title: Cписок неизвестных отправлений
                required:
                  - success
        default:
          description: |-
            An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Заказы
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/forward_unrecognized_list_req'
