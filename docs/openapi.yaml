                Массив обязателен для отправлений [консолидации](#order_cons_desc) и [пересылки](#mail_forward_desc)).
              title: Список товаров в заказе для оформления таможенной декларации
            sender_addr:
              type: object
              properties:
                country:
                  type: string
                zip_sender:
                  type: string
                region_sender:
                  type: string
                district1:
                  type: string
                city_sender:
                  type: string
                street_sender:
                  type: string
                house_sender:
                  type: string
                bldg_sender:
                  type: string
