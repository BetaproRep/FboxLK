      <a name="delivery123"></a>
      ## 123 DPX Express
      Служба доставки используется только для [пересылки отправлений](#mail_forward_desc) из Китая
      
      Особенности заполнения полей запроса [Создать заказы  (post /orders)](#tag/Zakazy/operation/common_interface_order_create):
      
      * `orders.dev123` - раздел обязателен для заполения
      
      * `orders.declared_value` - указывается стоимость отправления в USD 
      
      * `orders.client.name` - Recipient's name. Cannot contain Chinese characters
      * `orders.client.phone` - Receiver's mobile phone number Cannot contain Chinese, Recipient's contact number (landline) / recipient's mobile phone number,There must be at least one
      * `orders.client.phone2` - Receiver's telephone number (landline). Cannot contain Chinese, Recipient's contact number (landline) / recipient's mobile phone number,There must be at least one
      
      
      * `orders.address.zip` - **required** Recipient's  postcode. Contains only digits, letters, and hyphens (-).
      * `orders.address.region` - **required** The province of the Recipient. Cannot contain Chinese characters
      * `orders.address.area` -  Recipient's county/district. Cannot contain Chinese characters
      * `orders.address.city` - **required** Name of the city of the Recipient. Cannot contain Chinese characters
      * `orders.address.street` - **required** English address of Recipient. Can contain only letters, numbers, and symbols
      * `orders.address.house` - House number of Recipient. Cannot contain Chinese characters
      
       
      Пример [Создать заказы  (post /orders)](#tag/Zakazy/operation/common_interface_order_create) для [пересылки отправлений](#mail_forward_desc)
      ```json
      {
        orders:[
          {
            order_id:"test_order123_3",
            declared_value:30.4,
            cod:0,
            delivery_id:123,
            "client":{
              "name":"Olga Baranovskaja",
              "phone":"+7(962)8428631",
              "phone2":"+7(495)8428631",
              "email":"olgabaranovskaa280@gmail.com"
            },
            "address":{
              "zip":"142841",
              "region":"Moskovskaya Obl.",
              "area":"Gorodskoj Okrug Stupino",
              "city":"Mikhnevo",
              "street":"Ul. Michurina, d. 12, kv. 2",
              "house":""
            },
            forwarded_parcels:[
              {
                barcode:"9998270090965",
                length:105,
                width:106,
                height:107,
                weight:1000
              },
            ],
            dev123:{
              "express_type":"DDT136",
              "has_liquid":true,
              "has_battery":false,
              "has_powder":false,
              "products":[
