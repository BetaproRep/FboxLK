  /orders/calculator:
    post:
      operationId: common_interface_order_calculator
      summary: Калькулятор стоимости доставки заказа
      description: |-
        
        ## post /orders/calculator      
        
        
      parameters: []
      responses:
        '200':
          description: |-
            The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                    title: Признак успешного запроса
                  address:
                    type: object
                    properties:
                      quality_code:
                        type: integer
                        format: int32
                        description: |-
                          * `0` - Адрес распознан уверенно
                          * `1` - Остались "лишние" части. Пример: "109341 Тверская область Москва Верхние Поля" - здесь лишняя "Тверская область"
                          * `2` - Адрес пустой или заведомо "мусорный"
                          * `3` - Есть альтернативные варианты. Пример: "Москва Тверская-Ямская" - в Москве четыре Тверских-Ямских улицы
                        title: Качество распознования адреса
                      country_code:
                        type: string
                        description: |-
                          Для работы с международными отправлениями требуется согласование с Исполнителем
                        title: Двухбуквенный код страны адреса доставки
                      zip:
                        type: string
                        title: Почтовый индекс
                      region:
                        type: string
                        title: Область, регион
                      area:
                        type: string
                        title: Район
                      city:
                        type: string
                        title: Город
                      street:
                        type: string
                        title: Улица
                      house:
                        type: string
                        title: Дом
                    required:
                      - quality_code
                    title: Структурированный адрес доставки
                  deliveries:
                    type: array
                    items:
                      type: object
                      properties:
                        delivery_id:
                          type: integer
                          format: int32
                          description: |-
                            см. [Справочник служб доставки](#deliveries)
                          title: Идентификатор службы доставки
                        delivery_name:
                          type: string
                          title: Название службы доставки
                        tariffs:
                          type: array
                          items:
                            type: object
                            properties:
                              tariff_id:
                                type: string
                                title: Идентификатор тарифа
                              tariff_name:
                                type: string
                                title: Название тарифа
                              is_pickpoint:
                                type: boolean
                                description: |-
                                  * `true` - тариф применяется для доставки в ПВЗ
                                  * `false` - тариф применяется для доставки курьером
                                title: Тариф для пункта выдачи заказа
                              tariff:
                                allOf:
                                  - $ref: '#/components/schemas/money'
                                title: Сумма тарифа
                              min_days:
                                type: integer
                                format: int32
                                title: Минимальный срок доставки (дни)
                              max_days:
                                type: integer
                                format: int32
                                title: Максимальный срок доставки (дни)
                            required:
                              - tariff_id
                              - tariff_name
                              - is_pickpoint
                              - tariff
                          title: Тарифы доставки
                        pickpoints:
                          type: array
                          items:
                            type: object
                            properties:
                              pickpoint_id:
                                type: string
                                title: Идентификатор пункта выдачи заказа
                              pickpoint_name:
                                type: string
                                title: Название пункта выдачи
                              address:
                                type: string
                                title: Адрес пункта выдачи
                              coordinates:
                                type: string
                                title: Географические координаты пункта выдачи
                              schedule:
                                type: string
                                title: Расписание работы пункта выдачи
                              phone:
                                type: string
                                title: Телефон пункта выдачи
                              note:
                                type: string
                                title: Примечание (как добраться)
                              distance:
                                type: integer
                                format: int32
                                title: Расстояние от адреса доставки до пункта выдачи (метры)
                            required:
                              - pickpoint_id
                              - pickpoint_name
                          title: Пункты выдачи заказов
                      required:
                        - delivery_id
                        - delivery_name
                    title: Службы доставки
                required:
                  - success
        default:
          description: |-
            An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Заказы
