      |**657**|<a name="attr657"></a>**Информация для координации систем заказчика**<br> type: `string` mode: `read/write`<br>Атрибут используется для координации взаимодействия различных систем Заказчика по совместной обработке исходящих документов.<br>см. [Совместное использование исходящих документов различными системами Заказчика](#outdoc_share_desc)<br>|


