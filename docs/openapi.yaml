      |`orders_receiving`|<a name="doc_type40"></a>**Получены заказы**<br>см. [Процесс обработки заказов](#order_obr_desc) пункт 1<br> Опциональный документ|
      |`orders_deficit`|<a name="doc_type41"></a>**Заказы не обеспечены товарами**<br>см. [Процесс обработки заказов](#order_obr_desc) пункт 2.2<br> Опциональный документ|
      |`orders_production_start`|<a name="doc_type42"></a>**Заказы переданы в производство**<br>см. [Процесс обработки заказов](#order_obr_desc) пункт 2.1<br> Опциональный документ|
      |`orders_pallet`|<a name="doc_type36"></a>**Заказы спаллетированы**<br>см. [Процесс обработки заказов](#order_obr_desc) пункт 4<br> Опциональный документ|
      |`orders_shipment`|<a name="doc_type6"></a>**Заказы отгружены в службу доставки**<br>см. [Процесс обработки заказов](#order_obr_desc) пункт 5.<br> Документ изменяет складские остатки|
      |`orders_shipment_refusal`|<a name="doc_type24"></a>**Отказ службы доставки в приеме заказов**<br>см. [Процесс обработки заказов](#order_obr_desc) пункт 6|
      |`orders_cancel`|<a name="doc_type15"></a>**Заказы аннулированы**<br>см. [Процесс обработки заказов](#order_obr_desc) пункт 3.1, [Отмена заказов](#order_cancel_desc)|
      |`orders_full_return`|<a name="doc_type2"></a>**Полный возврат заказов**<br>Документ создается исполнителем в случае если служба доставки возвратила заказ на склад исполнителя <br>**без нарушения целостности упаковки**. Как правило это возникает при невозможности доставить заказ клиенту.<br> <br>см. [Возвраты заказов](#order_ret_desc)<br> Документ изменяет складские остатки|
      |`orders_client_return`|<a name="doc_type16"></a>**Клиентский возврат заказов**<br>Документ создается исполнителем после получения товаров выкупленных и возвращенных клиентом.<br>Оприходование возврата осуществляется по следующей схеме:<br><br>Исполнитель получает отправление от клиента содержащее возвращаемые товары, бланк возврата, а также другие бумажные документы.<br>По отправлению исполнитель создает клиентский возврат и присваивает ему штриховой идентификатор `return_barcode`.<br>В атрибуте`parcel_barcode` фиксируется номер отправления полученного от клиента.<br>При наличии бланка возврата выполняется идентификация заказа в котором товар был отгружен клиенту и заполняется атрибут `order_id` <br>По согласованию с заказчиком исполнитель фотографирует все принятые товары, а также бумажные документы содержащиеся в клиентском возврате.<br><br>см. [Возвраты заказов](#order_ret_desc)<br> Документ изменяет складские остатки|
      |`orders_part_return`|<a name="doc_type14"></a>**Частичный возврат заказов**<br>Документ создается исполнителем в случае если служба доставки возвратила заказ на склад исполнителя <br>**с нарушением целостности упаковки**. Как правило это означает частичный выкуп заказа клиентом, <br>но также может быть связано с осмотром содержимого и отказом от покупки или другими причинами.<br><br>см. [Возвраты заказов](#order_ret_desc)<br> Документ изменяет складские остатки|
      |`orders_payment`|<a name="doc_type8"></a>**Оплата заказов**<br>Докумет создается после получения от службы доставки информации об оплате заказа клиентом,<br>в случае если взаимодействие со службой доставки выполняется по договору заключенному между исполнителем и службой доставки.<br>|
      |`orders_payment_transfer`|<a name="doc_type18"></a>**Перечисление наложенного платежа**<br>Докумет создается после получения наложенного платежа от службы доставки и перечисления заказчику,<br>в случае если взаимодействие со службой доставки выполняется по договору заключенному между исполнителем и службой доставки.<br>|
      |`exorders_supply`|<a name="doc_type35"></a>**Приняты отправления для консолидации**<br>см. [Консолидация отправлений](#order_cons_desc)|



      <a name="attrs_dict"></a>
      # Справочник атрибутов объектов
      см [Работа с атрибутами объектов](#attr_desc)

      <a name="good_attrs"></a>
      ## Атрибуты товара
      |#|Описание|
      |:-|:-|    
      |**16**|<a name="attr16"></a>**Отметка "Осторожно"**<br>json name: `fragile` type: `boolean` mode: `read/write`<br>* `true` - Отправление содержащее такой товар формируется со специальной отметкой Осторожно (Хрупкое). <br>Если это предусмотрено службой доставки, на адресном ярлыке печатается специальный знак (Рюмка). <br>В случае отправки почтой России данная отметка приводит к увеличению почтового тарифа на 30%<br><br>* `false` - значение по умолчанию|
      |**18**|<a name="attr18"></a>**Вид услуги Доставка**<br>json name: `is_dost` type: `boolean` mode: `read/write`<br>Атрибут используется для номенклатурных позиций типа Услуга `good_type="service"`<br><br>`true` - означает что данная позиция используется для расчета стоимость доставки, которую требуется  <br>передавать в отдельном поле заказа для некоторых служб доставки.<br>                          <br>`false` - значение по умолчанию|
      |**29**|<a name="attr29"></a>**Учет по сроку годности**<br>json name: `is_expir` type: `boolean` mode: `read/write`<br>* `true` - для товара требуется учет по сроку годности<br><br>* `false` - значение по умолчанию <br><br>см. [Учет товаров по срокам годности](#expir_desc)|
      |**60**|<a name="attr60"></a>**Оценочная стоимость товара**<br>json name: `ocenka` type: `float` mode: `read/write`<br>Указывается заказчиком для определения ответственности исполнителя в случае утраты товара по его вине.<br>По согласованию с заказчиком исполнителем может быть установлена дополнительная плата за страхование <br>хранящихся товаров в зависимости от оценочной стоимости.<br>  |
      |**79**|<a name="attr79"></a>**Категория зонирования товара**<br>json name: `zoning_id` type: `int` mode: `read/write`<br>Изменение этого атрибута со стороны заказчика возможно только для товаров которых нет на складе исполнителя <br><br>см. [Зонирование товаров](#bkind_desc)|
      |**106**|<a name="attr106"></a>**Ставка НДС**<br>json name: `good_st_vat` type: `int` mode: `read/write`<br>* `-1` - без НДС<br>* `0` - 0% НДС<br>* `10` - 10% НДС<br>* `20` - 20% НДС (значение по умолчанию)<br>|
      |**168**|<a name="attr168"></a>**Товарная категория заказчика**<br>json name: `pcat` type: `string` mode: `read/write`<br>Текстовое значение вида: <br>`Электроника`, `Красота и фитнес`, `Украшения` <br><br>Используется исполнителем по согласованию с заказчиком для построения аналитических отчетов по товародвижению|
      |**176**|<a name="attr176"></a>**Дней годности**<br>json name: `lifedays` type: `int` mode: `read/write`<br>Указывается количество дней годности товара.<br>Используется совместно со сроком окончания годности для определения даты производства<br><br>см. [Учет товаров по срокам годности](#expir_desc)|
      |**214**|<a name="attr214"></a>**Раздел карты комплектации**<br> type: `string` mode: `read/write`<br>Если значение атрибута заполенно, то при передаче в производство отправление содержащее данную номенклатурную позицию получит<br>раздел карты комплектации равный значению этого атрибута<br><br>Заполняется исполнителем по согласованию с заказчиком|
      |**219**|<a name="attr219"></a>**Код ТНВЭД**<br>json name: `tnved` type: `int` mode: `read/write`<br>Испльзуется для передачи информации в некоторые службы доставки<br><br>Заполняется исполнителем по согласованию с заказчиком|
      |**243**|<a name="attr243"></a>**Особенности приемки товара**<br>json name: `accept_features` type: `string` mode: `read/write`<br>Указываются дополнительные действия которые требуется выполнить с товаром в момент приемки на склад<br><br>Заполняется исполнителем по согласованию с заказчиком|
      |**265**|<a name="attr265"></a>**JSON для маркировки товара**<br>json name: `label_json` type: `json` mode: `read/write`<br>Содержит дополнительную информацию о товаре необходимую для маркировки.<br><br>Заполняется исполнителем по согласованию с заказчиком.|
      |**268**|<a name="attr268"></a>**Обязательность указания серийного номера товара при приемке**<br>json name: `sn_mandant` type: `boolean` mode: `read/write`<br>Атрибут используется при завершении документа поставки на складе Исполнителя.<br><br>Если значение атрибута не установлено, то перед завершением документа поставки значение устанавливается равным `true` <br>если у товара когда либо был использован серийный номер или у товара заполнен атрибут <br><button popovertarget="popattr307" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">307 Артикул номенклатурной позиции чьи серийные номера могут быть использованы для маркировки</button> <br><br>Значение <br>* `true` означает, что документ не может быть завершен в случае, если принят товар у которого отсутствует серийный номер. <br>* `false` означает что такая проверка не выполняется.<br><br>Можно перепределить это поведение для конкретного задания на оприходование товаров в атрибуте `$.items.sn_mandant`  <br><br>см. [Серийные номера](#good_sn_desc) <br><br>|
      |**307**|<a name="attr307"></a>**Артикул номенклатурной позиции чьи серийные номера могут быть использованы для маркировки**<br>json name: `sn_form_good` type: `string` mode: `read/write`<br>см. [Серийные номера](#good_sn_desc)<br><br>Используется по согласованию с заказчиком|
      |**346**|<a name="attr346"></a>**Минимальное количество дней до истечения срока годности для приемки товара как норма**<br>json name: `receive_expir_days` type: `float` mode: `read/write`<br>При получении товара на склад исполнитель принимает его как брак, если до окончания срока годности товара <br>осталось менее учазанного числа дней. <br><br>см. [Учет товаров по срокам годности](#expir_desc)|
      |**347**|<a name="attr347"></a>**Минимальное количество дней до истечения срока годности для отгрузки товара в заказах**<br>json name: `send_expir_days` type: `float` mode: `read/write`<br>Товар не может быть отгружен в заказах клиентам, если до окончания срока годности осталось менее учазанного числа дней. <br><br>см. [Учет товаров по срокам годности](#expir_desc)<br>|
      |**367**|<a name="attr367"></a>**Текст который показывается при упаковке товара в отправление**<br>json name: `pack_txt` type: `string` mode: `read/write`<br>Текст отображается на терминале упаковщика в строке товара.<br>Используется для указания дополнительных действий с товаром при упаковке в отправление.<br><br>Заполняется исполнителем по согласованию с заказчиком.|
      |**372**|<a name="attr372"></a>**Сопутствующий товар в заказе 1**<br>json name: `extraorder_good1` type: `string` mode: `read/write`<br>Указывается код товара заказчика `good_id`<br><br>см [Сопутствующие товары](#extra_goods_desc)|
      |**373**|<a name="attr373"></a>**Сопутствующий товар в заказе 2**<br>json name: `extraorder_good2` type: `string` mode: `read/write`<br>Указывается код товара заказчика `good_id`<br><br>см [Сопутствующие товары](#extra_goods_desc)|
      |**420**|<a name="attr420"></a>**№ отчета для биркования экземпляра при комплектации или отгрузке на сторону**<br>json name: `trol_etag_rep` type: `string` mode: `read/write`<br>Используется для обязательной маркировки товара при комплектации или отгрузке на сторону<br><br>После подбора товаров по карте комплектации или документу Отгрузка на стророну <br>для наименований с установленным атрибутом будет выполняться маркировка<br>с использованием указанного отчета<br><br>Атрибут заполняется по согласованию с заказчиком |
      |**431**|<a name="attr431"></a>**Требуется УИН**<br>json name: `need_uin` type: `boolean` mode: `read/write`<br>`true` - для товара обязательна маркировака УИН<br><br>Атрибут заполняется по согласованию с заказчиком|
      |**442**|<a name="attr442"></a>**Сопутствующий товар в заказе 3**<br>json name: `extraorder_good3` type: `string` mode: `read/write`<br>Указывается код товара заказчика `good_id`<br><br>см [Сопутствующие товары](#extra_goods_desc)|
      |**443**|<a name="attr443"></a>**Сопутствующий товар в заказе 4**<br>json name: `extraorder_good4` type: `string` mode: `read/write`<br>Указывается код товара заказчика `good_id`<br><br>см [Сопутствующие товары](#extra_goods_desc)|
      |**444**|<a name="attr444"></a>**Сопутствующий товар в заказе 5**<br>json name: `extraorder_good5` type: `string` mode: `read/write`<br>Указывается код товара заказчика `good_id`<br><br>см [Сопутствующие товары](#extra_goods_desc)|
      |**445**|<a name="attr445"></a>**Сопутствующий товар в заказе 6**<br>json name: `extraorder_good6` type: `string` mode: `read/write`<br>Указывается код товара заказчика `good_id`<br><br>см [Сопутствующие товары](#extra_goods_desc)|
      |**457**|<a name="attr457"></a>**Цена на бирке для WB**<br>json name: `wb_ebirka_price` type: `float` mode: `read/write`<br>При отгрузке заказов на WB для печати бирок будет использована цена указанная в атрибуте<br>вместо цены получаемой в заказе. <br>Сделано для указания максимальной розничной цены вместо цены со скидкой получаемой в заказе.|
      |**486**|<a name="attr486"></a>**Упаковка заказа для Wildberries**<br>json name: `wb_packs` type: `string` mode: `read/write`<br>Список номеров упаковок через запятую в которые допустима упаковка товара для передачи заказа в WB.<br>После списка номеров через символ '\|' указывается текст который выводится на экран упаковщику  <br><br>Пример:<br> `102,91,45\|Трёхслойный короб`<br> '106\|Без упаковки, обернуть в стрейч-пленку'<br><br>Атрибут заполняется по согласованию с заказчиком<br>|
      |**534**|<a name="attr534"></a>**Страна происхождения товара. Код ISO (2х буквенный)**<br>json name: `country_iso` type: `string` mode: `read/write`<br>Используется для передачи данных о позиции заказа в ОЗОН|
      |**580**|<a name="attr580"></a>**Информация о поставщике (в формате json)**<br>json name: `supplier_json` type: `json` mode: `read/write`<br>Используется для передачи данных о товарных позициях заказа в службы доставки.  <br>Задается в формате json с ключами supplier, inn, tel, addr<br><br>Пример: `{"supplier":"Рога и Корыта","inn":"1100220033","tel":"+79031112233","addr":"Москва, Тюбетейкин пер.7"}` |
      |**608**|<a name="attr608"></a>**Яндекс жидкость**<br>json name: `yandex_liquid` type: `boolean` mode: `read/write`<br>`true` - означает жидкость которая требует специальной маркировки на коробе при отгрузке в Яндекс|
      |**610**|<a name="attr610"></a>**EAN для Ламода**<br>json name: `lm_ean` type: `string` mode: `read/write`<br>Штрихкод на товаре передаваемый в Ламода по схеме FBO|
      |**635**|<a name="attr635"></a>**Публичное название товара**<br>json name: `public_name` type: `string` mode: `read/write`<br>Используется в печатных формах документов для клиентов.<br>Если атрибут не заполнен используется название товара `good_name`   |


      <a name="doc3_attrs"></a>
      ## Атрибуты документа поставки товаров 
      |#|Описание|
      |:-|:-|    
      |**9**|<a name="attr9"></a>**Порядковый номер частичной приемки**<br> type: `int` mode: `read only`<br>см. [Приемка товаров частями](#goods_inpart_desc)|
      |**56**|<a name="attr56"></a>**№ счет фактуры**<br>json name: `sf_num` type: `string` mode: `read/write`<br>Используется для печати определенных документов.<br><br>Заполняется по согласованию с исполнителем|
      |**57**|<a name="attr57"></a>**Дата счет фактуры**<br>json name: `sf_date` type: `date` mode: `read/write`<br>Используется для печати определенных документов.<br><br>Заполняется по согласованию с исполнителем|
      |**58**|<a name="attr58"></a>**№ торг 12**<br>json name: `tr12_num` type: `string` mode: `read/write`<br>Используется для печати определенных документов.<br><br>Заполняется по согласованию с исполнителем|
      |**59**|<a name="attr59"></a>**Дата торг 12**<br>json name: `tr12_date` type: `date` mode: `read/write`<br>Используется для печати определенных документов.<br><br>Заполняется по согласованию с исполнителем|
      |**76**|<a name="attr76"></a>**Грузоотправитель**<br>json name: `gruzotpr` type: `string` mode: `read/write`<br>Используется для печати определенных документов.<br><br>Заполняется по согласованию с исполнителем|
      |**128**|<a name="attr128"></a>**Аккаунт с которого перемещается товар**<br>json name: `source_partner` type: `int` mode: `read/write`<br>Для перемещения товаров между аккаунтами в задании на оприходование в атрибуте указывается partner_id c которого требуется выполнить перемещение товаров<br><br>см. [Перемещение товара между аккаунтами](#goods_xow_desc)|
      |**135**|<a name="attr135"></a>**Качество товара которое требуется при перемещении с другого аккаунта**<br>json name: `source_qual_type` type: `string` mode: `read/write`<br>Для перемещения товаров между аккаунтами указывается качество товаров которые требуется переместить<br>* `useful` - нормальный товар (значение по умолчанию)<br>* `defective` - бракованный товар <br><br>см. [Перемещение товара между аккаунтами](#goods_xow_desc)|
      |**143**|<a name="attr143"></a>**Аккаунт с которого перемещены товары**<br> type: `int` mode: `read only`<br>Атрибут используется в случае перемещения товаров между аккаунтами без создания заказчиком документа <button popovertarget="popdoc1" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на оприходование товаров (goods_supply_task)</button><br><br>см. [Перемещение товара между аккаунтами](#goods_xow_desc)|
      |**180**|<a name="attr180"></a>**Дата прибытия поставки**<br> type: `datetime` mode: `read only`<br>Время фактического прибытия транспорта с поставкой|
      |**181**|<a name="attr181"></a>**Дата начала приемки**<br> type: `datetime` mode: `read only`<br>Время фактического начала приемки товаров по документу поставки|
      |**305**|<a name="attr305"></a>**Пул серийных номеров для маркировки поставки**<br>json name: `sn_pool` type: `int` mode: `read/write`<br>Номер пула серийных номеров для приемки, печати и маркировки экземпляров товаров из поставки<br>см. [Пул серийных номеров](#sn_pool_desc)|
      |**306**|<a name="attr306"></a>**Истек срок ожидания поставки**<br> type: `boolean` mode: `read only`<br>см. [Непоставленные товары](#goods_timeout_desc)|
      |**350**|<a name="attr350"></a>**Возможность принимать излишки товаров**<br>json name: `surplus_enabled` type: `boolean` mode: `read/write`<br>см. [Излишки товара](#goods_izl_desc)|
      |**519**|<a name="attr519"></a>**Проверка качества принимаемых товаров**<br>json name: `qual_check` type: `boolean` mode: `read/write`<br>Значение `true` означает что требуется проверка качества принимаемых товаров.<br>Проверка выполняется исполнителем по согласованному с заказчиком регламенту.<br>Учитывается при расчете биллинга услуг.<br>|
      |**526**|<a name="attr526"></a>**Планируемая дата поставки**<br>json name: `shipment_date` type: `datetime` mode: `read/write`<br>Ожидаемое дата и время поступления товаров на склад исполнителя.<br>|
      |**541**|<a name="attr541"></a>**Требуется фото товаров по документу**<br> type: `int` mode: `read/write`<br>`0` - фото не требуются<br>`1` - требуются фото всех экземпляров<br>`2` - требуются только фото экземпляров брака<br>`3` - требуются фото в карточке товара<br>`4` - требуются фото в карточке товара или по одному из экземпляров<br><br>см. [Фото товаров](#good_photo_desc)|
      |**582**|<a name="attr582"></a>**Приемка поставки валом**<br> type: `boolean` mode: `read only`<br>Значение `true` означает что товары были поставлены валом и выполнена дополнительная работа по размещению товаров на паллеты.<br>Учитывается при расчете биллинга услуг.<br>|
      |**624**|<a name="attr624"></a>**Задание на оприходование по которому были обнаружены излишки**<br> type: `string` mode: `read only`<br>Указывается номер `indoc_id` документа <button popovertarget="popdoc1" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на оприходование товаров (goods_supply_task)</button> в котором были обнаружены излишки.<br><br>см [Излишки товара](#goods_izl_desc)|
      |**632**|<a name="attr632"></a>**BestMarket номер счета**<br>json name: `bm_invoice` type: `string` mode: `read/write`<br>Проходит транзитом из НСУ в Бестмаркет<br>не трогать|


      <a name="doc2_attrs"></a>
      ## Атрибуты документа отгрузки товаров
      |#|Описание|
      |:-|:-|    
      |**366**|<a name="attr366"></a>**FBO Режим отгрузки по схеме FBO**<br>json name: `fbo_mode` type: `int` mode: `read/write`<br>см [Отгрузка товаров по схеме FBO](#fbo_desc)|
      |**370**|<a name="attr370"></a>**Режим подбора по сроку годности**<br> type: `int` mode: `read/write`<br>`1` - использовать те же требования как и для отгрузки заказов<br>`-1` - без учета срока годности<br>`0` - товары с меньшим сроком годности в первую очередь<br><br>см. [Учет товаров по срокам годности](#expir_desc)|
      |**427**|<a name="attr427"></a>**FBO Одинаковая кратность товаров в коробах для отгрузки**<br>json name: `fbo_uniform` type: `string` mode: `read/write`<br>см [Отгрузка товаров по схеме FBO](#fbo_desc)|
      |**428**|<a name="attr428"></a>**FBO Использовать монокороба для отгрузки**<br>json name: `fbo_mono_box` type: `string` mode: `read/write`<br>см [Отгрузка товаров по схеме FBO](#fbo_desc)|
      |**456**|<a name="attr456"></a>**Печатать бирки по товарам в документе отгрузки на сторону**<br>json name: `ebirka_enabled` type: `string` mode: `read/write`<br>Признак возможности использования отчетов по экземплярам при отгрузке на сторону<br>*Если атрибут не задан, то по умолчанию используется параметр системы (настройки по умолчанию можно установить через вашего аккаунт менеджера*).<br>Значения:<br> `1` - *можно использовать отчеты по экземпляру*<br> `0` или `пусто` - *режим по умолчанию*<br>***Пример:*** `1` <br>|
      |**521**|<a name="attr521"></a>**Передать в документ поставки другого аккаунта**<br>json name: `dest_zdoc_id` type: `string` mode: `read/write`<br>Перемещение между аккаунтами.<br>Атрибут используется для реализации товаров на другой аккаунт.<br>Для указания документа поставки используется формат Аккаунт:НомерЗаданияНаОприходование<br>где <br>  `Аккаунт` - аккаунт на который передаются товары<br>  `НомерЗаданияНаОприходование` - задание на оприходование по которому товар будет принят <br>*Атрибут должен быть заполнен на момент передачи задания на отгрузку.<br>При создании документа проверяется <br>1. Документ поставки должен быть создан и находиться в состоянии "Формирование"<br>2. Все товары из задания на отгрузку синхронизированы с аккаунтом получателя<br>Если все ок, то в документе поставки заполняется атрибут [465 Принять из расходного документа с другого аккаунта](https://lpw.betta.ru:8084/instruction/RestAPI.html#attr465).<br>иначе возврашается ошибка и документ отгрузки на сторону не создается.*<br>***Пример:*** `201:Тестовое перемещение 2025` <br>|
      |**531**|<a name="attr531"></a>**Обязательность размещения подобранных коробов на паллеты**<br>json name: `use_plt` type: `int` mode: `read/write`<br>Признак обязательности размещения подобранных коробов на паллетах<br>*Если атрибут не задан, то по умолчанию используется параметр системы (настройки по умолчанию можно установить через вашего аккаунт менеджера*).<br>Значения:<br> `1` - *короба обязаны быть размещены на паллете*<br> `0` или `пусто` - *режим по умолчанию*<br>***Пример:*** `1` <br>|
      |**550**|<a name="attr550"></a>**Документ отгрузки на сторону для которого выполнено списание материалов**<br> type: `string` mode: `read/write`<br>Номер документа заказчика для отгруки на сторону по которому выполнено списание материалов (тара, короба, пакеты использованные для транспортировки)<br>*используется по согласованию с исполнителем при настройке списания расходных материалов заказчика*<br>***Пример:*** `Отгрузка 2025 апрель, групповая` <br>|
      |**565**|<a name="attr565"></a>**Групповая отгрузка на сторону. Маркировка группы**<br>json name: `group_out_mark` type: `json` mode: `read/write`<br>Маска группировки по признаку для вывоза в одну точку назначения и подготовки "обьединенной" транспортной накладной<br>Значение прописываются в формате json<br>Структура:<br>    `date` - Дата вывоза <br>    `carrier` - Перевозчик <br>    `timeslot` - Временной слот<br>    `destination` - Пункт назначения<br>***Пример:*** <br>    `{"date":"2024-07-18","carrier":"Strizh","timeslot":"15:00","destination":"12ST_215"}` <br>    `{"date":"2024-07-18","carrier":"Strizh","timeslot":"Вечер","destination":"Атриум"}` <br><br>|
      |**567**|<a name="attr567"></a>**FBO Маркируются только паллеты**<br>json name: `fbo_plt_mark_only` type: `boolean` mode: `read/write`<br>`true` - маркируются только паллеты<br>`false` - режим по умолчанию (маркируются короба и при необходимости паллеты)<br><br>см [Отгрузка товаров по схеме FBO](#fbo_desc) |
      |**572**|<a name="attr572"></a>**Язык печатного документа**<br>json name: `lang` type: `string` mode: `read/write`<br>Язык печатного документа.<br>*используется по согласованию с исполнителем* <br>Значения:<br> `ENG` - *Английский язык*<br> `RUS` или `пусто` - *режим по умолчанию - Русский язык*<br>***Пример:*** `ENG`<br>|


