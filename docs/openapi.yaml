      parameters:
        - name: good_sn
          in: path
          required: true
          schema:
            type: string
            title: Серийный номер экземпляра товара
      responses:
        '200':
          description: |-
            The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                    title: Признак успешного запроса
                  serial_number:
                    type: object
                    properties:
                      good_sn:
                        type: string
                        description: |-
                          см. [Серийные номера](#good_sn_desc)
                        title: Серийный номер экземпляра товара
                      good_id:
                        type: string
                        maxLength: 255
                        description: |-
                          см. [Коды и названия товаров](#good_id_desc)
                        title: Код товара в системе Заказчика
                      sn_pool:
                        type: integer
                        format: int32
                        description: |-
                          см. [Пул серийных номеров](#sn_pool_desc)
                        title: Номер пула серийных номеров
                      state:
                        type: string
                        enum:
                          - not_used
                          - acceptance
                          - in_stock
                          - out_stock
                        description: |-
                          * `not_used` - не используется
                          * `acceptance` - в процессе приемки
                          * `in_stock` - размещен на складе
                          * `out_stock` - списан
                        title: Состояние серийного номера
                      qual_type:
                        $ref: '#/components/schemas/qual_type_en'
                      uin:
                        type: string
                      outdocs:
                        type: array
                        items:
                          type: object
                          properties:
                            outdoc_id:
                              type: integer
                              format: int32
                              title: Номер исходящего документа
                            outdoc_type:
                              allOf:
                                - $ref: '#/components/schemas/outdoc_type_en'
                              title: Тип исходящего документа
                            outdoc_type_descrip:
                              type: string
                              title: Описание типа исходящего документа
                            outdoc_date:
                              allOf:
                                - $ref: '#/components/schemas/date'
                              description: |-
                                Дата фактического выполнения работ по документу. 
                                Атрибут используется для учета работ выполненных Исполнителем за определенный промежуток времени. 
                                Для документов изменяющих товарные остатки атрибут определяет дату изменения остатка.
                                <br>Например: `2025-12-31` см. [Формат даты и времени](#date_desc)
                              title: Дата исходящего документа
                            outdoc_txt:
                              type: string
                              title: Примечание к исходящему документу
                            order_id:
                              type: string
                              title: Номер заказа в системе Заказчика
                            descrip:
                              type: string
                          required:
                            - outdoc_id
                            - outdoc_type
                            - outdoc_type_descrip
                            - outdoc_date
                        title: Движение экземпляра в разрезе исходящих документов
                      photos:
                        type: array
                        items:
                          type: object
                          properties:
                            photo_id:
                              type: integer
                              format: int32
                              title: Уникальный идентификатор фото
                            url:
                              type: string
                              title: Url для загрузки фото
                            created_at:
                              allOf:
                                - $ref: '#/components/schemas/datetime'
                              title: Дата создания фото
                            descrip:
                              type: string
                              title: Примечание к фото
                          required:
                            - photo_id
                            - url
                            - created_at
                        title: Фото экземпляра товара
                    required:
                      - good_sn
                      - good_id
                      - state
                    title: Информация о серийном номере
                required:
                  - success
                  - serial_number
        default:
          description: |-
            An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Товары
