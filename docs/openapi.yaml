  /tracking/ruspost:
    post:
      operationId: common_interface_tracking_ruspost
      summary: Трекинг отправлений почты России
      description: |-
        
        ## post /tracking/ruspost      
        
        Запрос предназначен для сохранения в информационной системе Заказчика данных об операциях над отправлениями в почте России.
        
        На стороне Заказчика рекомендуется создать процедуру, которая с периодичностью 1 раз в день 
        выполняет запрос, сохраняет полученные операции над отправлением и запоминает последний `update_id`,
        который используется на следующий день, для получения новых операций.
        
        Для эпизодического получения трекинга по заказу отгруженному в почту России без сохранения данных в своей системе
        удобно использовать запрос [Трекинг заказа в  почте России (get /tracking/ruspost/orders/{order_id})](#tag/Treking-otpravlenij/operation/common_interface_tracking_ruspost_order) 
      parameters: []
      responses:
        '200':
          description: |-
            The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                    title: Признак успешного запроса
                  page_next_token:
                    $ref: '#/components/schemas/tpage_next_token'
                  update_id:
                    type: integer
                    format: int32
                    description: |-
                      Сохраните `update_id` полученное в последнем запросе для будущих загрузок.  
                      Используйте его в запросе для загрузки новых операций произошедших с момента последней загрузки
                    title: Идентификатор изменения
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        barcode:
                          type: string
                          title: Штрихкод отправления
                        type:
                          type: integer
                          format: int32
                          description: |-
                            Примеры
                            * `1` - Прием 
                            * `2` - Вручение
                            * `3` - Возврат

                            Регламентируется Почтой России в документе РТМ 0002 КОДЫ И АТРИБУТЫ ОТПРАВЛЕНИЙ И ОПЕРАЦИЙ НАД НИМИ
                          title: Код вида операции над отправлением
                        category:
                          type: integer
                          format: int32
                          description: |-
                            Коды категорий нумеруются последовательно с единицы для каждого вида операций над отправлением.
                            Регламентируются Почтой России в документе РТМ 0002 КОДЫ И АТРИБУТЫ ОТПРАВЛЕНИЙ И ОПЕРАЦИЙ НАД НИМИ

                            Примеры для вида операции `2 Вручение`
                            * `1` - Вручение адресату 
                            * `2` - Вручение отправителю
                            * `3` - Выдано адресату через почтомат

                            **Фактический смысл операции определяется парой (Вид, Категория)**

                            Например (2, 1) означает получение отправления клиентом, (2, 2) означает возврат отправителю
                          title: Код категории
                        date:
                          allOf:
                            - $ref: '#/components/schemas/datetime'
                          title: Дата операции над отправлением
                        zip:
                          type: integer
                          format: int32
                          title: ОПС операциии над отправлением
                        descrip:
                          type: string
                          title: Описание операции
                      required:
                        - barcode
                        - type
                        - category
                        - date
                        - zip
                    title: Список операций над отправлением
                required:
                  - success
                  - update_id
        default:
          description: |-
            An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Трекинг отправлений
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                page_size:
                  type: integer
                  format: int32
                  title: Максимальное количество объектов на одной странице
                  default: 1000
                page_token:
                  type: string
                  description: |-
                    Если параметр не указан, возвращается первая страница.
                    Рекомендуется передавать значение выходного параметра `page_next_token`, полученное при последнем запросе.
                    [см. Пагинация в запросах](#paging_desc)
                  title: Идентификатор страницы c результатами
                update_id:
                  type: integer
                  format: int32
                  description: |-
                    Указывается значение `update_id` полученное в последнем запросе. 
                    В ответе будут выданы операции зафиксированные с момента последнего запроса.

                    Укажите 0, если необходимо получить данные по всем операциям для всех отправлений
                  title: Идентификатор последнего изменения
              required:
                - update_id
