            * `3` - Бандероль (используется по согласованию с Исполнителем)
            * `4` - Посылка
            * `7` - ЕМS (используется по согласованию с Исполнителем)
            * `23` - Посылка онлайн
            * `24` - Курьер онлайн
            * `47` - Посылка 1 класса
            * `53` - ЕКом (используется по согласованию с Исполнителем)
          title: Тип корреспонденции
          default: 4
        dev1mail_ctg:
          type: number
          enum:
            - 0
            - 1
            - 2
            - 3
          description: |-
            Используется по согласованию с Исполнителем
            * `0` - Простое
            * `1` - Заказное
            * `2` - C объявленной ценностью
            * `3` - Обыкновенное
          title: Категория почтового отправления
        dev1mail_mark:
          type: integer
          format: int32
          title: Почтовые отметки
        orsp_id:
          type: integer
          format: int32
          title: Идентификатор организации сдающей почту в системе Исполнителя
        blnp_id:
          type: integer
          format: int32
          title: Идентификатор набора почтовых реквизитов в системе Исполнителя
        plt_id:
          type: integer
          format: int32
