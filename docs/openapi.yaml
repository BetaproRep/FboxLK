                    max_days:
                      type: integer
                      format: int32
                      title: Максимальный срок доставки (дни)
                  required:
                    - tariff_id
                    - tariff_name
                    - is_pickpoint
                    - tariff
                title: Тарифы доставки
              pickpoints:
                type: array
                items:
                  type: object
                  properties:
