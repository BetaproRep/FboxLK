          type: string
          title: Название маркетплейса
        ownerdep_name:
          type: string
          title: Название подразделения Заказчика
        mpcard_id:
          type: string
          title: Артикул товара на маркетплейсе
        mpcard_name:
          type: string
          title: Название товара на маркетплейсе
        mpcard_eans:
          type: array
          items:
            type: string
          title: Штрихкоды товара на маркетплейсе
