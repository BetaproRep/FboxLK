    # Общая информация 
    ## Для разработчиков


    Базовый URL — `https://lpw.betta.ru:8084/grh/api`

    <a name="auth_desc"></a>
    ### Авторизация
    Авторизация осуществляется по протоколу [Basic Authentication](https://en.wikipedia.org/wiki/Basic_access_authentication).
    Предварительно для авторизации Заказчику необходимо запросить у менеджера Исполнителя код партнера `partner_id` и пароль `password`
    В каждом запросе к сервису должен быть передан заголовок вида

    Authorization: Basic {credentials}

    где {credentials} это строка в формате `partner_id:password` закодированная в Base64
    <br>например, для partner_id="123" и password="password" заголовок должен иметь вид
    ```
    Authorization: Basic MTIzOnBhc3N3b3Jk
    ```

    <a name="date_desc"></a>
    ### Формат даты и времени
    В ответах сервиса дата и время передаются в часовом поясе г. Москвы, при этом могут использоваться два формата:
    * `YYYY-MM-DD` - только дата (время московское), пример `2025-02-25`
    * `YYYY-MM-DDThh:mm:ss` - дата со временем (время московское), пример `2025-02-25T13:35:58`

    В запросах к сервису дата и время могут указываться в следующих форматах:
    * `YYYY-MM-DD` - только дата (время московское), пример `2025-02-25`
    * `YYYY-MM-DDThh:mm:ss` - дата со временем (время московское), пример `2025-02-25T13:35:58`
    * `YYYY-MM-DDThh:mm:ssZ` - дата со временем (время UTC), пример `2025-02-25T10:35:58Z`
    * `YYYY-MM-DDThh:mm:ss(+|-)hh:mm` - дата со временем и часовым поясом, пример `2025-02-25T10:35:58+03:00`

    где:
    <br>`YYYY` - указывает год в виде четырех десятичных цифр
    <br>`MM` - указывает месяц в виде двух десятичных цифр от 00 до 12
    <br>`DD` - указывает день в виде двух десятичных цифр от 00 до 31
    <br>`hh` - указывает час в виде двух десятичных цифр от 00 до 23
    <br>`mm` - указывает минуты в виде двух десятичных цифр от 00 до 59
    <br>`ss` - указывает секунды в виде двух десятичных цифр от 00 до 59
    <br>`Z` - указывает время UTC (часовой пояс 0)
    <br>`(+|-)hh:mm`- указывает часовой пояс как разницу с UTC. (Требуется один из `+` или `–`.)


    <a name="paging_desc"></a>
    ### Пагинация в запросах
    Некоторые запросы возвращают результат не целиком, а постранично.
    Для таких запросов в атрибуте `page_size` можно указать максимальное количество возвращаемых объектов.

    В ответе на первый запрос вы получите атрибут `page_next_token`. Это строка, которую нужно передать 
    в новом запросе в атрибуте `page_token` для получения следующей страницы.

    Чтобы получить результат полностью, выполните несколько последовательных запросов. 
    Если в ответе нет атрибута `page_next_token`, то вернулась последняя страница. Больше запросов делать не нужно.

    Если в запросе задается массив объектов, для которых нужно получить данные, то результат возвращается целиком по всем
    запрошенным объектам, при этом атрибуты запроса `page_size` и `page_token` игнорируются.

    Пример метода:
    [Получить список исходящих документов  (post /outdocs/list)](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_list)

    <a name="error_desc"></a>
    ### Работа с ошибками
    В ответе сервис возвращает JSON с корневым атрибутом `success`. 
    В случае успешного выполнения запроса возвращается значение `"success":true` и HTTP status code `200`.

    Если при выполнении запроса произошла ошибка, то все действия, произведенные запросом, отменяются (выполняется откат транзакции)
    и возвращается значение `"success":false`. В атрибутах `error_code` и `error_message` указываются код и описание ошибки. 
    Ошибки с `error_code` >= 1000 связаны с бизнес-логикой и описаны в разделе [Справочник ошибок](#error_dict), 
    другие коды ошибок связаны с протоколом HTTP, и их значение совпадает с HTTP status code.

    В зависимости от ошибки могут возвращаться следующие HTTP status code:
    * `400` Bad Request - что-то не так в содержании запроса 
    * `401` Unauthorized - в запросе не указан заголовок Authorization
    * `403` Forbidden - указано неверное значение в заголовке Authorization
    * `404` Not Found - запрашиваемый ресурс не найден, проверьте адрес запроса
    * `429` Too Many Requests - превышен лимит запросов


    <a name="rl_desc"></a>
    ### Лимиты для запросов
    Мы ограничиваем частоту запросов к API. Эти ограничения помогают предотвратить черезмерную нагрузку на сервис 
    связанную с ошибками в интеграции, а также атаки типа «отказ в обслуживании».

    Учет ограничений выполняется отдельно в разрезе каждого кода партнера `partner_id`.

    В системе действует ограничение на количество одновременных запросов. 
    Как правило запросы Заказчика должны выполняться в один поток. 

    Определены следующие лимиты:
    1. Суммарное количество запросов
    2. Суммарный размер тела запросов
    3. Суммарный размер тела ответов
    4. Суммарное количество ошибочных запросов (status code 4XX)
    5. Суммарный размер тела ошибочных запросов (status code 4XX)
    6. Суммарное время обработки запросов

    Для учета лимитов используется алгоритм Token Bucket. Подробное описание алгоритма несложно найти в интернете.
    Суть его реализации в текущем API заключается в следующем: Для каждого из лимитов определяется квота, 
    которая может быть израсходована в течение определенного времени.
    C одной стороны, квота уменьшается после выполнения запросов. С другой стороны, квота пополняется за счет течения времени.
    Размер квоты определяет скорость с которой она пополняется, например, если суточная квота составляет K, 
    то каждую секунду квота будет пополняться на K/24/60/60 пока не достигнет максимального значения К.
    Если после выполнения запроса квота уменьшится до отрицательного значения, то следующий запрос можно будет выполнить
    через время которое необходимо для пополнения квоты до нуля. 

    На каждый из лимитов определены две квоты: 
    1. Суточная квота - ограничивает среднюю нагрузку на API
    2. Минутная квота - ограничивает пиковую нагрузку на API

    Актуальные значения квот предоставленных Заказчику можно получить в элементе  `rate_limits` по запросу [Получить настройки  аккаунта (get /settings)](#tag/Nastrojki-akkaunta/operation/common_interface_settings_get)

    В случае превышения суточной или минутной квоты по любому из лимитов запрос возвращает HTTP status code `429` Too Many Requests.
    В поле `error_message` будет указан конкретный лимит по которому превышена квота, 
    а также время через которое можно повторить запрос. 

    Пример:
    ```json
    {
      "success":false,
      "error_code":429,
      "error_message":"Превышен лимит err_qnt на суммарное количество ошибочных запросов (status code 4XX). Выполните запрос через 12 секунд"
    }
    ```

    Так же в ответе указываются следующие заголовки:
    * `X-RateLimit-Reset` - время в секундах через которое можно сделать следующий запрос
    * `X-RateLimit-Remaining: 0` - 0 как признак того что квота полностью израсходована
    * `Retry-After` - дублируется значение из X-RateLimit-Reset

    В случае успешного выполнения запроса (HTTP status code `200`) в ответе указываются заголовки 
    * `X-RateLimit-Reset` - время в секундах через которое можно сделать следующий запрос (`0` еcли можно сразу)
    * `X-RateLimit-Remaining: 1` - 1 как признак того что никакие квоты не израсходованы полностью

    Рекомендуется анализировать значение заголовка `X-RateLimit-Reset` даже в случае успешного запроса
    чтобы замедлять отправку запросов до того, как они будут заблокированы. 

    Предоставляемых лимитов с запасом хватает для типичных сценариев использования API со стороны Заказчика.
    При следовании рекомендациям описанным в настоящей документации не должно возникать ситуаций когда запросы 
    отклоняются по причине превышения лимитов. Исполнитель может временно повысить лимиты по просьбе Заказчика 
    для проведения нестандартных операций типа восстановления потерянных документов. 

    <a name="attr_desc"></a>
    ## Работа с атрибутами объектов 
    Для работы со свойствами таких объектов, как товар и документ, в API используется механизм атрибутов объектов.
    Этот механизм позволяет унифицировать описание, передачу и получение данных об объектах.

    Атрибут имеет следующие характеристики: <div id="popattr9" popover style="padding: 10px;">**9 Порядковый номер частичной приемки**<br>Документ поставки attribute id: `9`  type: `int` mode: `read only`<br>см. [Приемка товаров частями](#goods_inpart_desc)</div><div id="popattr16" popover style="padding: 10px;">**16 Отметка "Осторожно"**<br>Номенклатурная позиция attribute id: `16` json name: `fragile` type: `boolean` mode: `read/write`<br>* `true` - Отправление содержащее такой товар формируется со специальной отметкой Осторожно (Хрупкое). <br>Если это предусмотрено службой доставки, на адресном ярлыке печатается специальный знак (Рюмка). <br>В случае отправки почтой России данная отметка приводит к увеличению почтового тарифа на 30%<br><br>* `false` - значение по умолчанию</div><div id="popattr18" popover style="padding: 10px;">**18 Вид услуги Доставка**<br>Номенклатурная позиция attribute id: `18` json name: `is_dost` type: `boolean` mode: `read/write`<br>Атрибут используется для номенклатурных позиций типа Услуга `good_type="service"`<br><br>`true` - означает что данная позиция используется для расчета стоимость доставки, которую требуется  <br>передавать в отдельном поле заказа для некоторых служб доставки.<br>                          <br>`false` - значение по умолчанию</div><div id="popattr29" popover style="padding: 10px;">**29 Учет по сроку годности**<br>Номенклатурная позиция attribute id: `29` json name: `is_expir` type: `boolean` mode: `read/write`<br>* `true` - для товара требуется учет по сроку годности<br><br>* `false` - значение по умолчанию <br><br>см. [Учет товаров по срокам годности](#expir_desc)</div><div id="popattr56" popover style="padding: 10px;">**56 № счет фактуры**<br>Документ поставки attribute id: `56` json name: `sf_num` type: `string` mode: `read/write`<br>Используется для печати определенных документов.<br><br>Заполняется по согласованию с исполнителем</div><div id="popattr57" popover style="padding: 10px;">**57 Дата счет фактуры**<br>Документ поставки attribute id: `57` json name: `sf_date` type: `date` mode: `read/write`<br>Используется для печати определенных документов.<br><br>Заполняется по согласованию с исполнителем</div><div id="popattr58" popover style="padding: 10px;">**58 № торг 12**<br>Документ поставки attribute id: `58` json name: `tr12_num` type: `string` mode: `read/write`<br>Используется для печати определенных документов.<br><br>Заполняется по согласованию с исполнителем</div><div id="popattr59" popover style="padding: 10px;">**59 Дата торг 12**<br>Документ поставки attribute id: `59` json name: `tr12_date` type: `date` mode: `read/write`<br>Используется для печати определенных документов.<br><br>Заполняется по согласованию с исполнителем</div><div id="popattr60" popover style="padding: 10px;">**60 Оценочная стоимость товара**<br>Номенклатурная позиция attribute id: `60` json name: `ocenka` type: `float` mode: `read/write`<br>Указывается заказчиком для определения ответственности исполнителя в случае утраты товара по его вине.<br>По согласованию с заказчиком исполнителем может быть установлена дополнительная плата за страхование <br>хранящихся товаров в зависимости от оценочной стоимости.<br>  </div><div id="popattr76" popover style="padding: 10px;">**76 Грузоотправитель**<br>Документ поставки attribute id: `76` json name: `gruzotpr` type: `string` mode: `read/write`<br>Используется для печати определенных документов.<br><br>Заполняется по согласованию с исполнителем</div><div id="popattr79" popover style="padding: 10px;">**79 Категория зонирования товара**<br>Номенклатурная позиция attribute id: `79` json name: `zoning_id` type: `int` mode: `read/write`<br>Изменение этого атрибута со стороны заказчика возможно только для товаров которых нет на складе исполнителя <br><br>см. [Зонирование товаров](#bkind_desc)</div><div id="popattr106" popover style="padding: 10px;">**106 Ставка НДС**<br>Номенклатурная позиция attribute id: `106` json name: `good_st_vat` type: `int` mode: `read/write`<br>* `-1` - без НДС<br>* `0` - 0% НДС<br>* `10` - 10% НДС<br>* `20` - 20% НДС (значение по умолчанию)<br></div><div id="popattr128" popover style="padding: 10px;">**128 Аккаунт с которого перемещается товар**<br>Документ поставки attribute id: `128` json name: `source_partner` type: `int` mode: `read/write`<br>Для перемещения товаров между аккаунтами в задании на оприходование в атрибуте указывается partner_id c которого требуется выполнить перемещение товаров<br><br>см. [Перемещение товара между аккаунтами](#goods_xow_desc)</div><div id="popattr135" popover style="padding: 10px;">**135 Качество товара которое требуется при перемещении с другого аккаунта**<br>Документ поставки attribute id: `135` json name: `source_qual_type` type: `string` mode: `read/write`<br>Для перемещения товаров между аккаунтами указывается качество товаров которые требуется переместить<br>* `useful` - нормальный товар (значение по умолчанию)<br>* `defective` - бракованный товар <br><br>см. [Перемещение товара между аккаунтами](#goods_xow_desc)</div><div id="popattr143" popover style="padding: 10px;">**143 Аккаунт с которого перемещены товары**<br>Документ поставки attribute id: `143`  type: `int` mode: `read only`<br>Атрибут используется в случае перемещения товаров между аккаунтами без создания заказчиком документа <button popovertarget="popdoc1" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на оприходование товаров (goods_supply_task)</button><br><br>см. [Перемещение товара между аккаунтами](#goods_xow_desc)</div><div id="popattr168" popover style="padding: 10px;">**168 Товарная категория заказчика**<br>Номенклатурная позиция attribute id: `168` json name: `pcat` type: `string` mode: `read/write`<br>Текстовое значение вида: <br>`Электроника`, `Красота и фитнес`, `Украшения` <br><br>Используется исполнителем по согласованию с заказчиком для построения аналитических отчетов по товародвижению</div><div id="popattr176" popover style="padding: 10px;">**176 Дней годности**<br>Номенклатурная позиция attribute id: `176` json name: `lifedays` type: `int` mode: `read/write`<br>Указывается количество дней годности товара.<br>Используется совместно со сроком окончания годности для определения даты производства<br><br>см. [Учет товаров по срокам годности](#expir_desc)</div><div id="popattr180" popover style="padding: 10px;">**180 Дата прибытия поставки**<br>Документ поставки attribute id: `180`  type: `datetime` mode: `read only`<br>Время фактического прибытия транспорта с поставкой</div><div id="popattr181" popover style="padding: 10px;">**181 Дата начала приемки**<br>Документ поставки attribute id: `181`  type: `datetime` mode: `read only`<br>Время фактического начала приемки товаров по документу поставки</div><div id="popattr214" popover style="padding: 10px;">**214 Раздел карты комплектации**<br>Номенклатурная позиция attribute id: `214`  type: `string` mode: `read/write`<br>Если значение атрибута заполенно, то при передаче в производство отправление содержащее данную номенклатурную позицию получит<br>раздел карты комплектации равный значению этого атрибута<br><br>Заполняется исполнителем по согласованию с заказчиком</div><div id="popattr219" popover style="padding: 10px;">**219 Код ТНВЭД**<br>Номенклатурная позиция attribute id: `219` json name: `tnved` type: `int` mode: `read/write`<br>Испльзуется для передачи информации в некоторые службы доставки<br><br>Заполняется исполнителем по согласованию с заказчиком</div><div id="popattr243" popover style="padding: 10px;">**243 Особенности приемки товара**<br>Номенклатурная позиция attribute id: `243` json name: `accept_features` type: `string` mode: `read/write`<br>Указываются дополнительные действия которые требуется выполнить с товаром в момент приемки на склад<br><br>Заполняется исполнителем по согласованию с заказчиком</div><div id="popattr265" popover style="padding: 10px;">**265 JSON для маркировки товара**<br>Номенклатурная позиция attribute id: `265` json name: `label_json` type: `json` mode: `read/write`<br>Содержит дополнительную информацию о товаре необходимую для маркировки.<br><br>Заполняется исполнителем по согласованию с заказчиком.</div><div id="popattr268" popover style="padding: 10px;">**268 Обязательность указания серийного номера товара при приемке**<br>Номенклатурная позиция attribute id: `268` json name: `sn_mandant` type: `boolean` mode: `read/write`<br>Атрибут используется при завершении документа поставки на складе Исполнителя.<br><br>Если значение атрибута не установлено, то перед завершением документа поставки значение устанавливается равным `true` <br>если у товара когда либо был использован серийный номер или у товара заполнен атрибут <br><button popovertarget="popattr307" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">307 Артикул номенклатурной позиции чьи серийные номера могут быть использованы для маркировки</button> <br><br>Значение <br>* `true` означает, что документ не может быть завершен в случае, если принят товар у которого отсутствует серийный номер. <br>* `false` означает что такая проверка не выполняется.<br><br>Можно перепределить это поведение для конкретного задания на оприходование товаров в атрибуте `$.items.sn_mandant`  <br><br>см. [Серийные номера](#good_sn_desc) <br><br></div><div id="popattr305" popover style="padding: 10px;">**305 Пул серийных номеров для маркировки поставки**<br>Документ поставки attribute id: `305` json name: `sn_pool` type: `int` mode: `read/write`<br>Номер пула серийных номеров для приемки, печати и маркировки экземпляров товаров из поставки<br>см. [Пул серийных номеров](#sn_pool_desc)</div><div id="popattr306" popover style="padding: 10px;">**306 Истек срок ожидания поставки**<br>Документ поставки attribute id: `306`  type: `boolean` mode: `read only`<br>см. [Непоставленные товары](#goods_timeout_desc)</div><div id="popattr307" popover style="padding: 10px;">**307 Артикул номенклатурной позиции чьи серийные номера могут быть использованы для маркировки**<br>Номенклатурная позиция attribute id: `307` json name: `sn_form_good` type: `string` mode: `read/write`<br>см. [Серийные номера](#good_sn_desc)<br><br>Используется по согласованию с заказчиком</div><div id="popattr346" popover style="padding: 10px;">**346 Минимальное количество дней до истечения срока годности для приемки товара как норма**<br>Номенклатурная позиция attribute id: `346` json name: `receive_expir_days` type: `float` mode: `read/write`<br>При получении товара на склад исполнитель принимает его как брак, если до окончания срока годности товара <br>осталось менее учазанного числа дней. <br><br>см. [Учет товаров по срокам годности](#expir_desc)</div><div id="popattr347" popover style="padding: 10px;">**347 Минимальное количество дней до истечения срока годности для отгрузки товара в заказах**<br>Номенклатурная позиция attribute id: `347` json name: `send_expir_days` type: `float` mode: `read/write`<br>Товар не может быть отгружен в заказах клиентам, если до окончания срока годности осталось менее учазанного числа дней. <br><br>см. [Учет товаров по срокам годности](#expir_desc)<br></div><div id="popattr350" popover style="padding: 10px;">**350 Возможность принимать излишки товаров**<br>Документ поставки attribute id: `350` json name: `surplus_enabled` type: `boolean` mode: `read/write`<br>см. [Излишки товара](#goods_izl_desc)</div><div id="popattr366" popover style="padding: 10px;">**366 FBO Режим отгрузки по схеме FBO**<br>Документ отгрузки на сторону attribute id: `366` json name: `fbo_mode` type: `int` mode: `read/write`<br>см [Отгрузка товаров по схеме FBO](#fbo_desc)</div><div id="popattr367" popover style="padding: 10px;">**367 Текст который показывается при упаковке товара в отправление**<br>Номенклатурная позиция attribute id: `367` json name: `pack_txt` type: `string` mode: `read/write`<br>Текст отображается на терминале упаковщика в строке товара.<br>Используется для указания дополнительных действий с товаром при упаковке в отправление.<br><br>Заполняется исполнителем по согласованию с заказчиком.</div><div id="popattr370" popover style="padding: 10px;">**370 Режим подбора по сроку годности**<br>Документ отгрузки на сторону attribute id: `370`  type: `int` mode: `read/write`<br>`1` - использовать те же требования как и для отгрузки заказов<br>`-1` - без учета срока годности<br>`0` - товары с меньшим сроком годности в первую очередь<br><br>см. [Учет товаров по срокам годности](#expir_desc)</div><div id="popattr372" popover style="padding: 10px;">**372 Сопутствующий товар в заказе 1**<br>Номенклатурная позиция attribute id: `372` json name: `extraorder_good1` type: `string` mode: `read/write`<br>Указывается код товара заказчика `good_id`<br><br>см [Сопутствующие товары](#extra_goods_desc)</div><div id="popattr373" popover style="padding: 10px;">**373 Сопутствующий товар в заказе 2**<br>Номенклатурная позиция attribute id: `373` json name: `extraorder_good2` type: `string` mode: `read/write`<br>Указывается код товара заказчика `good_id`<br><br>см [Сопутствующие товары](#extra_goods_desc)</div><div id="popattr420" popover style="padding: 10px;">**420 № отчета для биркования экземпляра при комплектации или отгрузке на сторону**<br>Номенклатурная позиция attribute id: `420` json name: `trol_etag_rep` type: `string` mode: `read/write`<br>Используется для обязательной маркировки товара при комплектации или отгрузке на сторону<br><br>После подбора товаров по карте комплектации или документу Отгрузка на стророну <br>для наименований с установленным атрибутом будет выполняться маркировка<br>с использованием указанного отчета<br><br>Атрибут заполняется по согласованию с заказчиком </div><div id="popattr427" popover style="padding: 10px;">**427 FBO Одинаковая кратность товаров в коробах для отгрузки**<br>Документ отгрузки на сторону attribute id: `427` json name: `fbo_uniform` type: `string` mode: `read/write`<br>см [Отгрузка товаров по схеме FBO](#fbo_desc)</div><div id="popattr428" popover style="padding: 10px;">**428 FBO Использовать монокороба для отгрузки**<br>Документ отгрузки на сторону attribute id: `428` json name: `fbo_mono_box` type: `string` mode: `read/write`<br>см [Отгрузка товаров по схеме FBO](#fbo_desc)</div><div id="popattr431" popover style="padding: 10px;">**431 Требуется УИН**<br>Номенклатурная позиция attribute id: `431` json name: `need_uin` type: `boolean` mode: `read/write`<br>`true` - для товара обязательна маркировака УИН<br><br>Атрибут заполняется по согласованию с заказчиком</div><div id="popattr442" popover style="padding: 10px;">**442 Сопутствующий товар в заказе 3**<br>Номенклатурная позиция attribute id: `442` json name: `extraorder_good3` type: `string` mode: `read/write`<br>Указывается код товара заказчика `good_id`<br><br>см [Сопутствующие товары](#extra_goods_desc)</div><div id="popattr443" popover style="padding: 10px;">**443 Сопутствующий товар в заказе 4**<br>Номенклатурная позиция attribute id: `443` json name: `extraorder_good4` type: `string` mode: `read/write`<br>Указывается код товара заказчика `good_id`<br><br>см [Сопутствующие товары](#extra_goods_desc)</div><div id="popattr444" popover style="padding: 10px;">**444 Сопутствующий товар в заказе 5**<br>Номенклатурная позиция attribute id: `444` json name: `extraorder_good5` type: `string` mode: `read/write`<br>Указывается код товара заказчика `good_id`<br><br>см [Сопутствующие товары](#extra_goods_desc)</div><div id="popattr445" popover style="padding: 10px;">**445 Сопутствующий товар в заказе 6**<br>Номенклатурная позиция attribute id: `445` json name: `extraorder_good6` type: `string` mode: `read/write`<br>Указывается код товара заказчика `good_id`<br><br>см [Сопутствующие товары](#extra_goods_desc)</div><div id="popattr456" popover style="padding: 10px;">**456 Печатать бирки по товарам в документе отгрузки на сторону**<br>Документ отгрузки на сторону attribute id: `456` json name: `ebirka_enabled` type: `string` mode: `read/write`<br>Признак возможности использования отчетов по экземплярам при отгрузке на сторону<br>*Если атрибут не задан, то по умолчанию используется параметр системы (настройки по умолчанию можно установить через вашего аккаунт менеджера*).<br>Значения:<br> `1` - *можно использовать отчеты по экземпляру*<br> `0` или `пусто` - *режим по умолчанию*<br>***Пример:*** `1` <br></div><div id="popattr457" popover style="padding: 10px;">**457 Цена на бирке для WB**<br>Номенклатурная позиция attribute id: `457` json name: `wb_ebirka_price` type: `float` mode: `read/write`<br>При отгрузке заказов на WB для печати бирок будет использована цена указанная в атрибуте<br>вместо цены получаемой в заказе. <br>Сделано для указания максимальной розничной цены вместо цены со скидкой получаемой в заказе.</div><div id="popattr486" popover style="padding: 10px;">**486 Упаковка заказа для Wildberries**<br>Номенклатурная позиция attribute id: `486` json name: `wb_packs` type: `string` mode: `read/write`<br>Список номеров упаковок через запятую в которые допустима упаковка товара для передачи заказа в WB.<br>После списка номеров через символ '\|' указывается текст который выводится на экран упаковщику  <br><br>Пример:<br> `102,91,45\|Трёхслойный короб`<br> '106\|Без упаковки, обернуть в стрейч-пленку'<br><br>Атрибут заполняется по согласованию с заказчиком<br></div><div id="popattr519" popover style="padding: 10px;">**519 Проверка качества принимаемых товаров**<br>Документ поставки attribute id: `519` json name: `qual_check` type: `boolean` mode: `read/write`<br>Значение `true` означает что требуется проверка качества принимаемых товаров.<br>Проверка выполняется исполнителем по согласованному с заказчиком регламенту.<br>Учитывается при расчете биллинга услуг.<br></div><div id="popattr521" popover style="padding: 10px;">**521 Передать в документ поставки другого аккаунта**<br>Документ отгрузки на сторону attribute id: `521` json name: `dest_zdoc_id` type: `string` mode: `read/write`<br>Перемещение между аккаунтами.<br>Атрибут используется для реализации товаров на другой аккаунт.<br>Для указания документа поставки используется формат Аккаунт:НомерЗаданияНаОприходование<br>где <br>  `Аккаунт` - аккаунт на который передаются товары<br>  `НомерЗаданияНаОприходование` - задание на оприходование по которому товар будет принят <br>*Атрибут должен быть заполнен на момент передачи задания на отгрузку.<br>При создании документа проверяется <br>1. Документ поставки должен быть создан и находиться в состоянии "Формирование"<br>2. Все товары из задания на отгрузку синхронизированы с аккаунтом получателя<br>Если все ок, то в документе поставки заполняется атрибут [465 Принять из расходного документа с другого аккаунта](https://lpw.betta.ru:8084/instruction/RestAPI.html#attr465).<br>иначе возврашается ошибка и документ отгрузки на сторону не создается.*<br>***Пример:*** `201:Тестовое перемещение 2025` <br></div><div id="popattr526" popover style="padding: 10px;">**526 Планируемая дата поставки**<br>Документ поставки attribute id: `526` json name: `shipment_date` type: `datetime` mode: `read/write`<br>Ожидаемое дата и время поступления товаров на склад исполнителя.<br></div><div id="popattr531" popover style="padding: 10px;">**531 Обязательность размещения подобранных коробов на паллеты**<br>Документ отгрузки на сторону attribute id: `531` json name: `use_plt` type: `int` mode: `read/write`<br>Признак обязательности размещения подобранных коробов на паллетах<br>*Если атрибут не задан, то по умолчанию используется параметр системы (настройки по умолчанию можно установить через вашего аккаунт менеджера*).<br>Значения:<br> `1` - *короба обязаны быть размещены на паллете*<br> `0` или `пусто` - *режим по умолчанию*<br>***Пример:*** `1` <br></div><div id="popattr534" popover style="padding: 10px;">**534 Страна происхождения товара. Код ISO (2х буквенный)**<br>Номенклатурная позиция attribute id: `534` json name: `country_iso` type: `string` mode: `read/write`<br>Используется для передачи данных о позиции заказа в ОЗОН</div><div id="popattr541" popover style="padding: 10px;">**541 Требуется фото товаров по документу**<br>Документ поставки attribute id: `541`  type: `int` mode: `read/write`<br>`0` - фото не требуются<br>`1` - требуются фото всех экземпляров<br>`2` - требуются только фото экземпляров брака<br>`3` - требуются фото в карточке товара<br>`4` - требуются фото в карточке товара или по одному из экземпляров<br><br>см. [Фото товаров](#good_photo_desc)</div><div id="popattr550" popover style="padding: 10px;">**550 Документ отгрузки на сторону для которого выполнено списание материалов**<br>Документ отгрузки на сторону attribute id: `550`  type: `string` mode: `read/write`<br>Номер документа заказчика для отгруки на сторону по которому выполнено списание материалов (тара, короба, пакеты использованные для транспортировки)<br>*используется по согласованию с исполнителем при настройке списания расходных материалов заказчика*<br>***Пример:*** `Отгрузка 2025 апрель, групповая` <br></div><div id="popattr565" popover style="padding: 10px;">**565 Групповая отгрузка на сторону. Маркировка группы**<br>Документ отгрузки на сторону attribute id: `565` json name: `group_out_mark` type: `json` mode: `read/write`<br>Маска группировки по признаку для вывоза в одну точку назначения и подготовки "обьединенной" транспортной накладной<br>Значение прописываются в формате json<br>Структура:<br>    `date` - Дата вывоза <br>    `carrier` - Перевозчик <br>    `timeslot` - Временной слот<br>    `destination` - Пункт назначения<br>***Пример:*** <br>    `{"date":"2024-07-18","carrier":"Strizh","timeslot":"15:00","destination":"12ST_215"}` <br>    `{"date":"2024-07-18","carrier":"Strizh","timeslot":"Вечер","destination":"Атриум"}` <br><br></div><div id="popattr567" popover style="padding: 10px;">**567 FBO Маркируются только паллеты**<br>Документ отгрузки на сторону attribute id: `567` json name: `fbo_plt_mark_only` type: `boolean` mode: `read/write`<br>`true` - маркируются только паллеты<br>`false` - режим по умолчанию (маркируются короба и при необходимости паллеты)<br><br>см [Отгрузка товаров по схеме FBO](#fbo_desc) </div><div id="popattr572" popover style="padding: 10px;">**572 Язык печатного документа**<br>Документ отгрузки на сторону attribute id: `572` json name: `lang` type: `string` mode: `read/write`<br>Язык печатного документа.<br>*используется по согласованию с исполнителем* <br>Значения:<br> `ENG` - *Английский язык*<br> `RUS` или `пусто` - *режим по умолчанию - Русский язык*<br>***Пример:*** `ENG`<br></div><div id="popattr580" popover style="padding: 10px;">**580 Информация о поставщике (в формате json)**<br>Номенклатурная позиция attribute id: `580` json name: `supplier_json` type: `json` mode: `read/write`<br>Используется для передачи данных о товарных позициях заказа в службы доставки.  <br>Задается в формате json с ключами supplier, inn, tel, addr<br><br>Пример: `{"supplier":"Рога и Корыта","inn":"1100220033","tel":"+79031112233","addr":"Москва, Тюбетейкин пер.7"}` </div><div id="popattr582" popover style="padding: 10px;">**582 Приемка поставки валом**<br>Документ поставки attribute id: `582`  type: `boolean` mode: `read only`<br>Значение `true` означает что товары были поставлены валом и выполнена дополнительная работа по размещению товаров на паллеты.<br>Учитывается при расчете биллинга услуг.<br></div><div id="popattr600" popover style="padding: 10px;">**600 Ozon штрихкод для сдачи поставки с заказами**<br>Любой документ attribute id: `600`  type: `string` mode: `read/write`<br>Озон.<br>Штрихкод для идентификации поставки при сдаче подготовленных отправлений в ПВЗ.<br>Формируется и получается в автоматическом режиме</div><div id="popattr608" popover style="padding: 10px;">**608 Яндекс жидкость**<br>Номенклатурная позиция attribute id: `608` json name: `yandex_liquid` type: `boolean` mode: `read/write`<br>`true` - означает жидкость которая требует специальной маркировки на коробе при отгрузке в Яндекс</div><div id="popattr610" popover style="padding: 10px;">**610 EAN для Ламода**<br>Номенклатурная позиция attribute id: `610` json name: `lm_ean` type: `string` mode: `read/write`<br>Штрихкод на товаре передаваемый в Ламода по схеме FBO</div><div id="popattr624" popover style="padding: 10px;">**624 Задание на оприходование по которому были обнаружены излишки**<br>Документ поставки attribute id: `624`  type: `string` mode: `read only`<br>Указывается номер `indoc_id` документа <button popovertarget="popdoc1" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на оприходование товаров (goods_supply_task)</button> в котором были обнаружены излишки.<br><br>см [Излишки товара](#goods_izl_desc)</div><div id="popattr632" popover style="padding: 10px;">**632 BestMarket номер счета**<br>Документ поставки attribute id: `632` json name: `bm_invoice` type: `string` mode: `read/write`<br>Проходит транзитом из НСУ в Бестмаркет<br>не трогать</div><div id="popattr635" popover style="padding: 10px;">**635 Публичное название товара**<br>Номенклатурная позиция attribute id: `635` json name: `public_name` type: `string` mode: `read/write`<br>Используется в печатных формах документов для клиентов.<br>Если атрибут не заполнен используется название товара `good_name`   </div><div id="popattr646" popover style="padding: 10px;">**646 Дополнительная информация по документу**<br>Любой документ attribute id: `646` json name: `additional_info` type: `string` mode: `read/write`<br>Используется Заказчиком по согласованию с Исполнителем <br>для передачи дополнительной информации по входящему документу, которая не была известна на момент создания документа.</div><div id="popattr657" popover style="padding: 10px;">**657 Информация для координации систем заказчика**<br>Любой документ attribute id: `657`  type: `string` mode: `read/write`<br>Атрибут используется для координации взаимодействия различных систем Заказчика по совместной обработке исходящих документов.<br>см. [Совместное использование исходящих документов различными системами Заказчика](#outdoc_share_desc)<br></div><div id="popdoc1" popover style="padding: 10px;">
