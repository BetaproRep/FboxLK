      <a name="delivery101"></a>
      ## 101 Berlin RusPost
      Служба доставки используется для отправки заказов из Берлина в Россию.
      
      Особенности заполнения полей запроса [Создать заказы  (post /orders)](#tag/Zakazy/operation/common_interface_order_create):
      
      * `orders.dev101` - раздел обязателен для заполения
      * `orders.client.phone` - атрибут не обязателен для заполнения
      * `orders.address.zip` - атрибут обязателен для заполнения, остальные поля адреса должны заполняться в соответствии с требованиями почты России
      * `orders.delivery.no_return` - поддерживается опция Утилизация невыкупленного заказа
      
       
      Пример [Создать заказы  (post /orders)](#tag/Zakazy/operation/common_interface_order_create) для [пересылки отправлений](#mail_forward_desc)
      ```json
      {
        orders:[
          {
            order_id:"test_order101_1",
            declared_value:8502,
            cod:0,
            delivery_id:101,
            "client":{
              "name":"Ольга Барановская",
              "phone":"+7(962)8428631",
              "email":"olgabaranovskaa280@gmail.com"
            },
            "address":{
              "zip":"142841",
              "region":"Московская обл.",
              "area":"городской округ Ступино",
              "city":"Михнево",
              "street":"ул. Мичурина",
              "house":"д. 20, кв. 12"
            },
            forwarded_parcels:[
              {
                barcode:"9995270090969",
                length:105,
                width:106,
                height:107,
                weight:315
              },
            ],
            "dev101":{
              "mailtype":2,
              "products":[
                {
                  "product_name":"XS 10 Intelligent Battery Charger for Car Batteries",
                  "qnt":1,
                  "weight":300,
                  "product_value_euro":101.16,
                  "hscode":"33059000",
                  "invoice_id":"087-35684",
                  "url":"https://www.ddd.de/product/1924963994/",
                  "country_of_origin":"DE",
                  "nummer":"03"
                }
              ]
            },
          }
        ]
      }
      ```
      

