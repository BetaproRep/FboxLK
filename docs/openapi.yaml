          allOf:
            - $ref: '#/components/schemas/money'
          title: Оценочная стоимость отправления
        cod:
          allOf:
            - $ref: '#/components/schemas/money'
          title: Наложенный платеж отправления
        weight:
          type: integer
          format: int32
          title: Вес отправления, граммы
        unit_qnt:
          type: integer
          format: int32
          title: Количество мест в отправлении
