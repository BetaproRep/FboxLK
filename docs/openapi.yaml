                            descrip:
                              type: string
                              title: Описание события
                          required:
                            - event_id
                            - event_date
                            - event_type
                            - descrip
                        title: События связанные с заказом
                    required:
                      - order_id
                      - created_at
                      - indoc_id
                      - delivery_id
                      - delivery_name
                      - canceled
                    title: Информация о выбранном заказе
                required:
                  - success
                  - order
        default:
          description: |-
            An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Заказы
