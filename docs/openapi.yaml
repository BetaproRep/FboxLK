      **Клиентский возврат заказов**
      <br>Исходящий документ outdoc_type: `orders_client_return` [меняет остатки](#doc_stocker_desc) 
      <br>Документ создается исполнителем после получения товаров выкупленных и возвращенных клиентом.<br>Оприходование возврата осуществляется по следующей схеме:<br><br>Исполнитель получает отправление от клиента содержащее возвращаемые товары, бланк возврата, а также другие бумажные документы.<br>По отправлению исполнитель создает клиентский возврат и присваивает ему штриховой идентификатор `return_barcode`.<br>В атрибуте`parcel_barcode` фиксируется номер отправления полученного от клиента.<br>При наличии бланка возврата выполняется идентификация заказа в котором товар был отгружен клиенту и заполняется атрибут `order_id` <br>По согласованию с заказчиком исполнитель фотографирует все принятые товары, а также бумажные документы содержащиеся в клиентском возврате.<br><br>см. [Возвраты заказов](#order_ret_desc)
      <br><br>Для изучения структуры документа перейдите по ссылке<br>[Получить содержимое исходящего документа  (get /outdocs/{outdoc_id})](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_data)<br> и выберите элемент <div style="color: #32329f; display: inline-block; border:solid 1px; padding:1px 8px;">orders_client_return</div> в разделе Responses/200/Any of.
