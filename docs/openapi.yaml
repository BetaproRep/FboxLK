    money:
      type: number
    order:
      type: object
      required:
        - order_id
        - delivery_id
      properties:
        order_id:
          type: string
          title: Номер заказа в системе Заказчика
        origin:
          type: string
          description: |-
            Система из которой был получен заказ.
            При загрузке заказа из маркетплейса Исполнитель указывает следующие значения
            * `OZON` - Озон
            * `WB` - Вайлдберриз
            * `YANDEX` - Яндекс
            * `LAMODA` - Ламода

            Заказчик может заполнять этот атрибут только значениями согласованными с Исполнителем
          title: Источник заказа
        delivery_id:
          type: integer
          format: int32
          description: |-
            см. [Справочник служб доставки](#deliveries)
          title: Идентификатор службы доставки
        declared_value:
          allOf:
            - $ref: '#/components/schemas/money'
          minimum: 0
          description: |-
            Атрибут обязателен для заполнения, если массив goods не передается (отправления для [консолидации](#order_cons_desc) и [пересылки](#mail_forward_desc)).
            <br>Если в заказе указан массив goods, заполнение атрибута не обязательно, оценочная стоимость заказа рассчитывается 
            как сумма позиций заказа goods.declared_value.
          title: Оценочная стоимость заказа
        cod:
          allOf:
            - $ref: '#/components/schemas/money'
          minimum: 0
          description: |-
            Атрибут обязателен для заполнения, если массив goods не передается (отправления для [консолидации](#order_cons_desc) и [пересылки](#mail_forward_desc)).
            <br>Если в заказе указан массив goods, заполнение атрибута не обязательно, наложенный платеж заказа рассчитывается 
            как сумма позиций заказа goods.cod.
          title: Наложенный платеж заказа
        goods:
          type: array
          items:
            type: object
            properties:
              good_id:
                type: string
                maxLength: 255
                description: |-
                  см. [Коды и названия товаров](#good_id_desc)
                title: Код товара в системе Заказчика
              declared_value:
                allOf:
                  - $ref: '#/components/schemas/money'
                title: Оценочная стоимость позиции заказа
              cod:
                allOf:
                  - $ref: '#/components/schemas/money'
                title: Наложенный платеж позиции заказа
              vat_rate:
                type: number
                enum:
                  - -1
                  - 0
                  - 10
                  - 20
                  - 22
                description: |-
                  * `-1` - Без НДС 
                  * `0` - 0% 
                  * `10` - 10% 
                  * `20` - 20% 
                  * `22` - 22%
                title: Ставка НДС
                default: 22
              vat_amount:
                allOf:
                  - $ref: '#/components/schemas/money'
                title: Сумма НДС
              perso:
                allOf:
                  - $ref: '#/components/schemas/json'
                description: |-
                  Дополнительная информация о вложении. Используется для печати листовок и маркировки товаров
                  см. [Персонализированные вложения](#order_perso_desc)
                title: Данные для персонализации
              opis_price:
                allOf:
                  - $ref: '#/components/schemas/money'
                description: |-
                  Если атрибут не заполнен, то будет использоваться значение declared_value
                title: Цена в описи вложений
              ebirka_price:
                allOf:
                  - $ref: '#/components/schemas/money'
                description: |-
                  Если атрибут не заполнен, то будет использоваться значение declared_value
                title: Цена на бирке для ювелирных изделий
            required:
              - good_id
              - declared_value
              - cod
          description: |-
            Раздел обязателен для заполнения по всем заказам, кроме отправлений для [консолидации](#order_cons_desc) и [пересылки](#mail_forward_desc)
            <br>**Кол-во экземпляров в позиции заказа всегда равно 1**
          title: Список позиций заказа
        delivery:
          type: object
          properties:
            barcode:
              type: string
              description: |-
                Штрихкод должен глобально-уникально идентифицировать отправление.
                Атрибут обязателен для заполнения если адресный ярлык передается Заказчиком в файле для 
                для печати (см `order.files`). 

                Заполнение этого атрибута требует согласования с Исполнителем
              title: Штрихкод отправления на адресном ярлыке
            pickpoint_id:
              type: string
              description: |-
                Указывается идентификатор из информационной системы выбранной службы доставки. 
                <br>Заполняется в случае если доставка осуществляется не по адресу клиента, а в пункт выдачи заказа.
                Как правило в этом случае указание адреса клиента (элемент `address`) не требуется
              title: Идентификатор пункта выдачи заказа
            memo:
              type: string
              description: |-
                Дополнительная информация для курьера.
                Как правило содержит пожелания клиента по доставке заказа
              title: Примечание к доставке
            shipping_price:
              type: object
              properties:
                price:
                  allOf:
                    - $ref: '#/components/schemas/money'
                  title: Стоимость доставки при полном выкупе
                ret_price:
                  allOf:
                    - $ref: '#/components/schemas/money'
                  title: Стоимость доставки при полном возврате
                vat:
                  type: number
                  enum:
                    - -1
                    - 0
                    - 10
                    - 20
                    - 22
                  description: |-
                    * `-1` - Без НДС 
                    * `0` - 0% 
                    * `10` - 10% 
                    * `20` - 20% 
                    * `22` - 22%
                  title: Ставка НДС
                  default: 22
                threshold:
                  type: array
                  items:
                    type: object
                    properties:
                      below:
                        allOf:
                          - $ref: '#/components/schemas/money'
                        title: Сумма выкупа не более
                      price:
                        allOf:
                          - $ref: '#/components/schemas/money'
                        title: Стоимость доставки
                    required:
                      - below
                      - price
                  description: |-
                    Cумма доставки которую оплачивает клиент при получении отправления
                    в зависимости от стоимости выкупленных товаров.
                  title: Уровни градаций стоимости доставки в зависимости от суммы выкупа
              required:
                - price
                - ret_price
              title: Стоимость доставки для клиента
            part_deliv:
              type: boolean
              description: |-
                Возможность для клиента выкупать только часть товаров из заказа. Оставшиеся позиции служба доставки возвращает
              title: Опция частичной доставки
            primerka:
              type: boolean
              title: Опция примерки
            can_open:
              type: boolean
              description: |-
                Возможность для клиента перед оплатой заказа осмотреть содержимое
              title: Опция осмотра содержимого
            no_return:
              type: boolean
              description: |-
                Заказ невыкупленный клиентом утилизируется службой доставки, а не возвращается
              title: Утилизация невыкупленного заказа
            date:
              type: string
              description: |-
                Дата когда заказ должен быть доставлен клиенту. Формат данных определяется требованиями службы доставки
              title: Дата доставки
            time:
              type: string
              description: |-
                Время когда заказ должен быть доставлен клиенту. Формат данных определяется требованиями службы доставки
              title: Время доставки
            timeend:
              type: string
              description: |-
                Указывается до которого часа курьер должен приехать к клиенту. Формат данных определяется требованиями службы доставки
              title: Максимальное временя доставки
          description: |-
            Набор универсальных атрибутов которые могут быть использованы различными службами доставки.
            Применимость тех или иных атрибутов к конкретной службе доставки необходимо уточнять у Исполнителя
          title: Параметры доставки
        client:
          type: object
          properties:
            name:
              type: string
              description: |-
                Заполняется в соответствии с требованиями службы доставки
              title: ФИО клиента
            phone:
              type: string
              description: |-
                Как правило обязателен при доставке курьерскими службами
              title: Контактный телефон
            phone2:
              type: string
              title: Дополнительный телефон
            email:
              type: string
              title: Email клиента
          title: Информация о получателе
        address:
          type: object
          properties:
            zip:
              type: string
              title: Почтовый индекс
            fias:
              type: string
              title: 'Код адреса в федеральной информационной адресной системе (ФИАС) '
            region:
              type: string
              title: Область, регион
            area:
              type: string
              title: Район
            city:
              type: string
              title: Населенный пункт
            street:
              type: string
              title: Улица
            house:
              type: string
              title: Дом, корпус, квартира
          title: Адрес доставки
        control:
          type: object
          properties:
            ownerdep_id:
              type: integer
              format: int32
              description: |-
                см. [Подразделения Заказчика](#ownerdep_desc)
              title: Код подразделения Заказчика
            to_delivery_date:
              allOf:
                - $ref: '#/components/schemas/datetime'
              description: |-
                Передача заказа в производство будет выполняться не ранее чем за несколько часов до указанного времени.
              title: Дата время передачи заказа в службу доставки
            is_fake_order:
              type: boolean
              description: |-
                `true` - заказ не нужно передавать в производство

                Используется для резервирования товаров и других целей.

                **Заполнение атрибута выполняется Заказчиком по согласованию с Исполнителем**
              title: Признак фиктивного заказа
              default: false
            split_pallet:
              type: string
              description: |-
                Атрибут используется группировки отправлений на разные паллеты при отгрузке в службу доставки.
                Отправление с одинаковым значением атрибута будут размещены на отдельных паллетах

                Первый символ атрибута имеет специальное значение
                * `/` - отправления будут отгружены отдельным документом отгрузки клиенту
                * `-` - отправления будут комплектоваться отдельными картами комплектации и передаваться в службу доставки отдельными документами отгрузки клиенту
                * `:` - отправления будут комплектоваться отдельными картами комплектации, при передаче в службу доставки могут размещаться на любых паллетах и в любых документах

                **Заполнение атрибута выполняется Заказчиком по согласованию с Исполнителем**
              title: Группировка отправлений при отгрузке
            permitted_packs:
              type: string
              description: |-
                Указывается список номеров упаковок через запятую в которые допустима упаковка заказа.
                <br>После списка номеров через символ '|' указывается текст который выводится на экран упаковщику  
                <br>Пример: `102,91,45|Трёхслойный короб`

                **Заполнение атрибута выполняется Заказчиком по согласованию с Исполнителем**
              title: Допустимые типы упаковки
            pack_warning:
              type: string
              description: |-
                Выводится на терминал упаковщика при упаковке отправления

                **Заполнение атрибута выполняется Заказчиком по согласованию с Исполнителем**
              title: Информация для упаковки
            plt_warning:
              type: string
              description: |-
                Выводится на терминал при паллетировании отправления

                **Заполнение атрибута выполняется Заказчиком по согласованию с Исполнителем**
              title: Информация для паллетирования
          title: Технологическая информация для Исполнителя
        files:
          type: array
          items:
            type: object
            properties:
              file_name:
                type: string
                description: |-
                  Название файла должно иметь расширение .pdf и быть уникально в пределах заказа.

                  Если файл используется в качестве адресного ярлыка название файла должно быть `label.pdf`. 
                  При этом в атрибуте `delivery.barcode` должен указываться штрихкод который напечатан на этом ярлыке.
                title: Название файла
              file_data:
                type: string
                description: |-
                  Содержимое файла должно кодироваться base64
                title: Содержимое файла
              barcode:
                type: string
                description: |-
                  Технологически печать файлов выполняется сразу для нескольких отправлений, поэтому для обеспечения безошибочной сортировки 
                  распечатанных документов по отправлениям на каждой странице печатного документа крайне желательно наличие
                  штрихкода уникально идентифицирующего заказ.
                title: Штрихкод
              print_group:
                type: string
                description: |-
                  Заполняется по согласованию с Исполнителем
                title: Группировка файлов для печати
              copy_qnt:
                type: integer
                format: int32
                title: Количество копий для печати
                default: 1
            required:
              - file_name
              - file_data
          description: |-
            К заказу можно прикрепить один или несколько pdf файлов, которые будут распечатаны Исполнителем и вложены в отправление 
            или использованы в качестве адресного ярлыка.
          title: Файлы для печати
        cons:
          type: object
          properties:
            barcode:
              type: string
              title: Штрихкод отправления для консолидации
            weight:
              type: integer
              format: int32
              title: Вес отправления, граммы
            length:
              type: integer
              format: int32
              title: Длина отправления, миллиметры
            width:
              type: integer
              format: int32
              title: Ширина отправления, миллиметры
            height:
              type: integer
              format: int32
              title: Высота отправления, миллиметры
            unit_qnt:
              type: integer
              format: int32
              description: |-
                Артибут обязателен для заполнения в случае многоместного отправления (количество коробов >= 2)
              title: Количество мест в многоместном отправлении
              default: 1
            goods:
              type: array
              items:
                type: object
                properties:
                  unit_num:
                    type: integer
                    format: int32
                    description: |-
                      Атрибут обязателен для заполнения в случае многоместного отправления (количество коробов >= 2)
                      <br>Нумерация мест в отправлении выполняется строго последовательно начиная с 1
                    title: Порядковый номер места (1, 2...) в котором размещено вложение
                    default: 1
                  cons_good_id:
                    type: string
                    title: Артикул товара
                  cons_good_name:
                    type: string
                    title: Название товара
                  qnt:
                    type: integer
                    format: int32
                    title: Количество единиц товара в отправлении или месте
                  declared_value:
                    allOf:
                      - $ref: '#/components/schemas/money'
                    title: Оценочная стоимость всех единиц товара
                  cod:
                    allOf:
                      - $ref: '#/components/schemas/money'
                    title: Наложенный платеж всех единиц товара
                  vat_rate:
                    type: number
                    enum:
                      - -1
                      - 0
                      - 10
                      - 20
                      - 22
                    description: |-
                      * `-1` - Без НДС 
                      * `0` - 0% 
                      * `10` - 10% 
                      * `20` - 20% 
                      * `22` - 22%
                    title: Ставка НДС
                    default: 22
                  vat_amount:
                    allOf:
                      - $ref: '#/components/schemas/money'
                    title: Сумма НДС всех единиц товара
                  weight:
                    type: integer
                    format: int32
                    title: Суммарный все всех единиц товара, граммы
                required:
                  - cons_good_id
                  - cons_good_name
                  - qnt
                  - declared_value
                  - cod
              description: |-
                Используется для передачи данных в службу доставки
              title: Состав отправления
            units:
              type: array
              items:
                type: object
                properties:
                  unit_num:
                    type: integer
                    format: int32
                    description: |-
                      Нумерация мест в отправлении выполняется строго последовательно начиная с 1
                    title: Порядковый номер места (1, 2...) в отправлении
                  barcode:
                    type: string
                    title: Штрихкод места в отправлении
                  weight:
                    type: integer
                    format: int32
                    title: Вес места, граммы
                  length:
                    type: integer
                    format: int32
                    title: Длина места, миллиметры
                  width:
                    type: integer
                    format: int32
                    title: Ширина места, миллиметры
                  height:
                    type: integer
                    format: int32
                    title: Высота места, миллиметры
                required:
                  - unit_num
                  - barcode
              description: |-
                Раздел обязателен для заполнения в случае многоместного отправления (количество коробов >= 2)
              title: Места в многоместном отправлении
          required:
            - barcode
          description: |-
            см. [Консолидация отправлений](#order_cons_desc)
          title: Данные по отправлению для консолидации
        forwarded_parcels:
          type: array
          items:
            type: object
            properties:
              barcode:
                type: string
                minLength: 6
                maxLength: 255
                description: |-
                  Отправление для пересылки должно быть отмаркировано штрихкодом, который уникально его идентифицирует. 
                  Штрихкод может быть использован **только в одном заказе** для конечного получателя.

                  Обычно этот штрихкод формирует интернет магазин в процессе обработки заказа.
                  Заказчик получает штрихкод отправления из интернет магазина и передает его Исполнителю.
                  Также штрихкод может быть предоставлен Исполнителем при обработке неизвестных отправлений
                  см. [Пересылка отправлений](#mail_forward_desc) пункт 2.3.
                title: Штрихкод отправления для пересылки
              weight:
                type: integer
                format: int32
                description: |-
                  Вес отправления полученный Заказчиком от интернет магазина
                title: Вес отправления, граммы
              length:
                type: integer
                format: int32
                description: |-
                  Длина отправления полученная Заказчиком от интернет магазина
                title: Длина отправления, миллиметры
              width:
                type: integer
                format: int32
                description: |-
                  Ширина отправления полученная Заказчиком от интернет магазина
                title: Ширина отправления, миллиметры
              height:
                type: integer
                format: int32
                description: |-
                  Высота отправления полученная Заказчиком от интернет магазина
                title: Высота отправления, миллиметры
            required:
              - barcode
          description: |-
            см. [Пересылка отправлений](#mail_forward_desc)
          title: Отправления для пересылки
        dev1:
          type: object
          properties:
            blnp_id:
              type: integer
              format: int32
              title: Идентификатор набора почтовых реквизитов в системе Исполнителя
              description: |-
                Заполнение атрибута выполняется Заказчиком по согласованию с Исполнителем
            nal_scheme:
              type: number
              enum:
                - 0
                - 1
                - 2
              description: |-
                * `0` - почтовые сборы не включаются в наложенный платеж
                * `1` - включить авиа тариф в наложенный платеж
                * `2` - включить весь почтовый тариф в наложенный платеж
              title: Способ включения почтовых сборов в наложенный платеж
              default: 0
            mail_type:
              type: number
              enum:
                - 3
                - 4
                - 7
                - 23
                - 24
                - 47
                - 53
              description: |-
                * `3` - Бандероль (используется по согласованию с Исполнителем)
                * `4` - Посылка
                * `7` - ЕМS (используется по согласованию с Исполнителем)
                * `23` - Посылка онлайн
                * `24` - Курьер онлайн
                * `47` - Посылка 1 класса
                * `53` - ЕКом (используется по согласованию с Исполнителем)
              title: Тип корреспонденции
              default: 4
            mail_ctg:
              type: number
              enum:
                - 0
                - 1
                - 2
                - 3
              description: |-
                Используется по согласованию с Исполнителем
                * `0` - Простое
                * `1` - Заказное
                * `2` - C объявленной ценностью
                * `3` - Обыкновенное
              title: Категория почтового отправления
            direct_ctg:
              type: number
              enum:
                - 1
                - 2
              description: |-
                * `1` - Внутренняя
                * `2` - Международная
              title: Код классификации отправления
              default: 1
            addr_type:
              type: string
              enum:
                - DEFAULT
                - PO_BOX
                - DEMAND
                - UNIT
              description: |-
                Используется при работе через АПИ Почты
                * `DEFAULT`- Стандартный (улица, дом, квартира)
                * `PO_BOX`- Абонентский ящик
                * `DEMAND` - До востребования
                * `UNIT` - Для военных частей
              title: Тип адреса
            check_complekt:
              type: boolean
              description: |-
                При включении услуги в отправление будут вложены:   
                * Акт осмотра содержимого – 3 экз. (обезличенный)   
                * Счет-накладная – 1 экз. (персонализированная).   

                За услугу почта взымает дополнительный тариф по состоянию на август 25 года это 36,00 с НДС.
              title: Услуга Проверка комплектности
            cod:
              type: boolean
              description: |-
                Используется по согласованию с Исполнителем
              title: Услуга Вручение с COD
            country:
              type: string
              description: |-
                Используется для международных отправлений
              title: Страна
            mpo_kurs:
              allOf:
                - $ref: '#/components/schemas/money'
              description: |-
                На основании курса будет сформирован наложенный платеж.
                Атрибут обязателен для заполнения для международных почтовых отправлений почты России с наложенным платежом

                Механизм работы следующий.

                При передаче заказа клиента в позициях заказа требуется указывать сумму оценки и сумму наложенного платежа в рублях.
                При формировании почтовых документов требуется две суммы наложенного платежа одна в рублях другая в национальной валюте.
                Сумма в валюте рассчитывается как сумма в рублях умноженная на значение этого атрибута. Именно эта сумма будет оплачена клиентом.
                По некоторым странам могут быть исключения по использованию валюты, например для Беларусии оплата выполняется в рублях. 
                Просьба уточнять данную информацию у менеджеров Исполнителя.
              title: Курс национальной валюты к рублю
            mpo_mode:
              type: number
              enum:
                - 1
                - 2
                - 3
              description: |-
                Используется для определения способа пересылки отправления (авиа или наземный) международных отправлений Почты России
                * `1` - Только наземный
                * `2` - Только авиа
                * `3` - Если доступно наземный иначе авиа
              title: Способ пересылки междунароных отправлений
          title: Почта России
        dev3:
          type: object
