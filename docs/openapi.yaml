            документ используется для корректировки остатков доступных для работы
            * `surplus`	- оприходование излишков, товар списывается с карантина и помещается на остаток, документ используется
            для оприходования ошибочно списанных товаров после завершения полной инвентаризации  
            * `useful_defective` -	перевод товара из нормы в брак и обратно
            * `regrade`	- пересорт (изменение кода товара) 
            * `expiration` -	выбраковка товара по сроку годности
            * `quarantine_reset` - обнуление карантина, документ создается после проведения полной инвентаризации 
            и отражает итоговые расхождения накопившегося в оперативном учете с момента предыдущей полной инвентаризации  					
          title: Тип документа коррекции
        correction_type_descrip:
          type: string
          title: Описание типа документа коррекции
        goods:
          type: array
          items:
            type: object
            properties:
              good_id:
                type: string
                maxLength: 255
                description: |-
                  см. [Коды и названия товаров](#good_id_desc)
                title: Код товара в системе Заказчика
              qual_type:
                $ref: '#/components/schemas/qual_type_en'
              stock_qnt:
                type: integer
                format: int32
                description: |-
                  С минусом означает недостачу, с плюсом излишки
                title: Скорректированное кол-во товара
              quarantine_qnt:
                type: integer
                format: int32
                description: |-
                  При выполнении частичной инвентаризации по документу коррекции товар списывается с обычного остатка 
                  и добавляется в остаток на карантине. т.е. quarantine_qnt = -qnt

                  При выполнении полной плановой инвентаризации выполняется списание накопившихся остатков на карантине в ноль. 
                  см correction_type = `quarantine_reset`
                title: Количество товара помещенное в карантин
            required:
              - good_id
              - qual_type
              - stock_qnt
              - quarantine_qnt
          title: Скорректированные позиции
