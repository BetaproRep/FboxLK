                * `1` - Свободный груз, посылка, являющаяся свободной в обращении выезжает как Почта из ЕС, стандартный вариант
                * `2` - Таможенный груз, посылка, прибывшая из-за пределов ЕС и не растаможенная, обычно используется для клиентов из США/Британии. 
                * `3` - Декларируемый груз, посылка, являющаяся свободной в обращении, но выезжает с декларацией

                Атрибут заполняется по согласованию с Исполнителем
              title: Код способа доставки
              default: 1
          description: |-
            Особенности использования см. [101 Berlin RusPost](#delivery101)
          title: Berlin RusPost
