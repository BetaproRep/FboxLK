    * `attribute_id` - числовой идентификатор атрибута
    * `attribute_name` - название атрибута
    * `json_name` - имя атрибута для передачи в JSON
    * `attribute_type` - тип атрибута, возможные значения: *string, boolean, int, float, date, datetime, json*
    * `attribute_mode` - режим доступа, возможные значения: *read/write* - значение атрибута может задавать Заказчик, *read only* - значение атрибута может задавать только Исполнитель

    Для получения информации об атрибутах в документации используются всплывающие подсказки, например, <button popovertarget="popattr16" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">16 Отметка "Осторожно"</button>.

    Перечень всех атрибутов объектов см. [Справочник атрибутов объектов](#attrs_dict).

    При передаче данных Заказчик может указать значения атрибута объекта двумя способами:

    1. Непосредственно при создании объекта по `json_name` в запросах
    <br> [Создать/изменить карточки товаров (post /goods)](#tag/Tovary/operation/common_interface_good_set)
    <br> [Создать входящий документ  (post /indocs)](#tag/Vhodyashie-dokumenty/operation/common_interface_indoc_create)

    Пример:
    ```json
    { 
      goods: [
        {
          "good_id": "test_good",
          "fragile": true,
          ...
        }  
      ]  
    }
    ```

    2. В массиве атрибутов, по `attribute_id`, в запросах
    <br> [Установить атрибуты товаров  (post /goods/attributes)](#tag/Tovary/operation/common_interface_good_attr_set)
    <br> [Установить атрибуты входящего документа  (post /indocs/{indoc_id}/attributes)](#tag/Vhodyashie-dokumenty/operation/common_interface_indoc_attr_set)
    <br> [Установить атрибуты исходящего документа  (post /outdocs/{outdoc_id}/attributes)](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_attr_set)

    Пример:
    ```json
    {
      "attributes":[
        {
          "good_id": "test_good",
          "attribute_id": 16,
          "value": true,
        },
        ...
      ]
    }
    ```

    Изначально все атрибуты объекта имеют пустое значение `null`. 
    <br>Если при передаче данных Заказчик не указал атрибут, то его значение остается неизменным. 
    <br>Для обнуления значения атрибута требуется явно передать значение `null`.

    В ответе на запрос в массиве атрибутов объекта `attributes` передаются только значения не пустых атрибутов.
    Например в запросе [Получить атрибуты входящего документа  (get /indocs/{indoc_id}/attributes)](#tag/Vhodyashie-dokumenty/operation/common_interface_indoc_attr_list)
    ```json
    {
      "items":[
        {
          "attribute_id":180,
          "attribute_name":"Дата прибытия поставки",
          "attribute_type":"datetime",
          "value":"2025-04-04T16:10:00"
        },
        {
          "attribute_id":22,
          "attribute_name":"Файл передан Заказчику",
          "attribute_type":"boolean",
          "value": true
        }
      ]
    }
    ```

    <a name="docs_desc"></a>
    ## Работа с документами
    Механизм документов используется для передачи Заказчиком заданий Исполнителю на выполнение определённых работ
    и получения от Исполнителя информации о ходе и результатах выполнения работ.

    Документы делятся на две группы: 
    * входящие документы — создаются Заказчиком и инициируют работу Исполнителя
    * исходящие документы — создаются Исполнителем для информирования Заказчика о ходе и результатах выполнения работ

    <a name="indoc_types_desc"></a>
    ### Входящие документы
    Для входящих документов используются следующие общие атрибуты:
    * `indoc_type` - тип входящего документа
    * `indoc_id` - номер документа в системе Заказчика
    * `indoc_txt` - примечание к документу. Заполняется Заказчиком по согласованию с Исполнителем  

    Остальные поля входящего документа зависят от его типа `indoc_type`. 
    Для изучения структуры конкретного типа документа перейдите по ссылке [Создать входящий документ  (post /indocs)](#tag/Vhodyashie-dokumenty/operation/common_interface_indoc_create)
    и выберите нужный элемент в разделе Any of.
    Для получения примера json выберите нужный элемент на правой панели Request samples из списка Example. 

    Список всех методов для работы с входящими документами указан в разделе [Входящие документы](#tag/Vhodyashie-dokumenty)

    <a name="indoc_id_desc"></a>
    #### Идентификация входящих документов 
    Все входящие документы должны иметь уникальный номер `indoc_id` независимо от типа документа. 
    По возможности следует указывать короткие буквенно-цифровые коды, которые удобно 
    использовать в переписке или голосовом общении. После удаления документа запросом [Удалить входящий документ  (delete /indocs/{indoc_id})](#tag/Vhodyashie-dokumenty/operation/common_interface_indoc_delete)
    номер документа может быть использован повторно.

    <a name="outdoc_types_desc"></a>
    ### Исходящие документы
    Исходящие документы создаются Исполнителем для информирования Заказчика о ходе и результатах выполнения работ.
    Получить данные, связанные с исходящим документом, можно с помощью следующих запросов:
    * [Получить содержимое исходящего документа  (get /outdocs/{outdoc_id})](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_data) - основная информация по документу, зависит от его типа `outdoc_type`. 
    Для изучения структуры для конкретного типа документа перейдите по ссылке [Получить содержимое исходящего документа  (get /outdocs/{outdoc_id})](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_data) 
    и выберите нужный элемент в разделе Responses/200/Any of. Для получения примера json выберите нужный элемент 
    на правой панели Response samples/200 из списка Example.   
    * [Получить движение товаров по документу  (get /outdocs/{outdoc_id}/goods)](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_goods), 
    * [Получить движение серийных номеров по документу  (get /outdocs/{outdoc_id}/good_sn)](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_good_sn),
    * [Получить фото для исходящего документа  (get /outdocs/{outdoc_id}/photos)](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_photo_list), 
    * [Получить атрибуты исходящего документа  (get /outdocs/{outdoc_id}/attributes)](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_attr_list), 
    * [Получить PDF файлы для исходящего документа (get /outdocs/{outdoc_id}/files)](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_file_list)

    Список всех методов для работы с исходящими документами указан в разделе [Исходящие документы](#tag/Ishodyashie-dokumenty).

    Исходящие документы обеспечивают внутреннюю согласованность различных объектов учёта. 
    <br>Например, документ <button popovertarget="popdoc6" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Заказы отгружены в службу доставки (orders_shipment)</button> одновременно выполняет перевод заказов в состояние "отгружено" и
    списание со склада товаров, использованных в этих заказах.

    #### Общие атрибуты исходящих документов:
    * `outdoc_type` - тип исходящего документа
    * `outdoc_id` - идентификатор исходящего документа
    * `created_at` - дата и время создания документа 
    * `locked` - документ заблокирован Заказчиком 
    * `unlock_request` - Исполнитель запросил снятие блокировки
    * `outdoc_date` - дата фактического выполнения работ
    * `outdoc_txt` - примечание к документу 
    * `indoc_id` - задание Заказчика, по которому создан исходящий документ

    #### Связь исходящих документов с входящими документами
    Если выполненные Исполнителем работы относятся к определенному заданию Заказчика, в исходящем документе 
    указывается артибут `indoc_id` - задание Заказчика, по которому создан исходящий документ.
    К таким документам относятся:
    * <button popovertarget="popdoc43" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Начата приемка товаров по заданию на оприходование (goods_supply_start)</button> 
    * <button popovertarget="popdoc9" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Товары оприходованы (goods_supply)</button> 
    * <button popovertarget="popdoc19" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Возврат товаров со склада длительного хранения (goods_from_long_storage)</button> 
    * <button popovertarget="popdoc25" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Товары пееремещены на склад длительного хранения (goods_to_long_storage)</button> 
    * <button popovertarget="popdoc44" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Начат подбор товаров по заданию на отгрузку (goods_shipment_start)</button> 
    * <button popovertarget="popdoc20" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Подобран товар для отгрузки (goods_shipment_ready)</button> 
    * <button popovertarget="popdoc10" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Товары отгружены (goods_shipment)</button> 
    * <button popovertarget="popdoc40" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Получены заказы (orders_receiving)</button> 

    Может быть создано несколько исходящих документов которые относятся к одному заданию Заказчика.

    В исходящем документе  <button popovertarget="popdoc6" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Заказы отгружены в службу доставки (orders_shipment)</button> `indoc_id` не заполняется, 
    т.к. в документе могут быть отгружены заказы из разных входящих документов <button popovertarget="popdoc5" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на отгрузку заказов (orders_shipment_task)</button>

    Также, атрибут `indoc_id` не заполняется для документов которые создаются без задания Заказчика, например:
    * <button popovertarget="popdoc4" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Инвентаризация-коррекция (goods_correction)</button> 
    * <button popovertarget="popdoc2" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Полный возврат заказов (orders_full_return)</button> 
    * <button popovertarget="popdoc16" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Клиентский возврат заказов (orders_client_return)</button> 

    #### Даты исходящих документов
    С исходящим документом связаны две даты: 
    * `created_at` - дата и время создания документа в системе Исполнителя. Это дата с указанием времени, 
    используется для отслеживания новых документов. 
    * `outdoc_date` - дата фактического выполнения работ. Это дата без указания времени, используется для формирования отчётов 
    о выполненных работах за период, например, для выставления счетов Заказчику за предыдущий месяц.

    Обычно документ создаётся в момент фактического завершения работы, 
    и значение `outdoc_date` — это та же дата, что и `created_at`, только без указания времени. 
    Однако могут быть исключения в случае коррекции старых документов. 

    #### Коррекция исходящих документов
    Данные, напрямую связанные с исходящим документом, остаются неизменными после его создания.
    Но могут быть ситуации, когда необходимо внести исправления задним числом, например, 
    если после завершения поставки товаров было обнаружено несоответствие количества принятого товара. 
    В этом случае созданный ранее документ удаляется, и создаётся новый с новым номером `outdoc_id` 
    и новой датой создания `created_at`. При этом дата выполнения работ `outdoc_date` указывается фактическая, 
    обычно та, что была в удалённых документах.

    #### Использование исходящих документов Заказчиком
    Как правило, только данные из исходящих документов должны использоваться Заказчиком как **основание для внесения изменений**
    в объекты учёта в своей системе. Этот подход гарантирует согласованность данных между системами Заказчика и Исполнителя,
    а в случае выявления расхождений позволяет легко понять их причину. 
    Например, в случае несовпадения остатков определённого товара в системах Заказчика и Исполнителя 
    достаточно проанализировать список исходящих документов, которые изменяли этот остаток. 

    Исходящие документы должны загружаться в систему Заказчика по мере их создания Исполнителем.

    Грубой ошибкой интеграции со стороны Заказчика является периодический опрос
    состояния объектов учёта и внесение изменений в свою систему на основании их **текущего** состояния.
    Например, когда изменение статусов заказов в системе Заказчика происходит на основании
    периодического выполнения запроса [Получить информацию по заказу  (get /orders/{order_id}/info)](#tag/Zakazy/operation/common_interface_order_info) по всем заказам, чей статус может измениться. 
    Так как текущее состояние может измениться сразу после опроса, такой подход не гарантирует согласованности данных между системами, 
    а простое увеличение частоты опроса приводит к многократной бессмысленной обработке одного и того же текущего состояния заказа.
    Использование исходящих документов для изменения статусов заказов в системе Заказчика полностью лишено указанных недостатков.

    #### Рекомендуемый порядок обработки исходящих документов в системе Заказчика
    На стороне Заказчика рекомендуется создать процесс, который отслеживает появление новых исходящих документов
    и выполняет изменения в системе на основании этих документов. Для этого можно создать процедуру, 
    которая запускается автоматически с периодичностью 1 час и выполняет следующие действия:

    1. Получить список незаблокированных документов Исполнителя при помощи запроса [Получить список исходящих документов  (post /outdocs/list)](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_list) 
    с параметрами `locked: false, unlock_request: false`.
    1. Для каждого документа из списка выполнить:
        1. [Установить блокировку на исходящие документы (post /outdocs/lock)](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_lock)
        1. Внести изменения в систему на основании данных, полученных по документу.

    Указанная последовательность действий гарантирует, что **все** исходящие документы будут загружены и 
    обработаны системой Заказчика **один и только один** раз.
    Гарантия достигается за счёт того, что отсутствие блокировки `locked: false` является признаком того, что документ
    ещё не загружен в систему Заказчика.

    <a name="outdoc_share_desc"></a>
    #### Совместное использование исходящих документов независимыми системами Заказчика
    Если со стороны Заказчика имеется **несколько** независимых систем, которые используют данные исходящих документов в своей работе,
    контроль за получением **всех** необходимых исходящих документов для каждой системы нельзя выполнить с использованием блокировки.
    В этом случае для отслеживания новых документов используется дата и время **создания** исходящего документа.

    Каждая система Заказчика сохраняет дату и время последнего опроса новых документов и в следующем опросе 
    получает документы, созданные Исполнителем с момента предыдущего опроса.
    При этом нужно учесть, что в системе Исполнителя дата и время фиксируются в момент **начала** создания документа,
    но сам документ не отображается в результатах запроса [Получить список исходящих документов  (post /outdocs/list)](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_list) до момента завершения транзакции. 
    Максимальное время транзакции не превышает 5 минут. Поэтому, чтобы **гарантировать** получение и обработку **всех** исходящих 
    документов **один и только один раз**, в запросе [Получить список исходящих документов  (post /outdocs/list)](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_list)
    рекомендуется использовать следующие параметры: 
    <br>`from_date:Tprev, to_date:Tcur-d`, где 

    * `Tcur-d` - текущие дата и время минус максимальное время транзакции d (5 мин). 
    Будут выбраны документы, созданные до этого момента времени, исключая сам момент времени.
    * `Tprev` - значение `Tcur-d`, которое использовалось в предыдущем опросе. 
    Будут выбраны документы, созданные после этого момента времени, включая сам момент времени. 

    Загружаемые исходящие документы могут быть удалены Исполнителем, если они не заблокированы Заказчиком и
    созданы не более 14 дней назад.

    Для обработки таких ситуаций Заказчик должен использовать запрос [Получить удаленные исходящие документы (post /outdocs/check)](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_check). 
    В этом запросе передается список номеров исходящих документов которые были загружены в систему Заказчика за последние 15 дней, 
    в ответ возвращаются номера документов которые отсутствуют в системе Исполнителя.
    Эти документы нужно удалить из системы Заказчика.

    При необходимости координации взаимодействия различных систем Заказчика по совместной обработке исходящих документов
    Исполнитель может создать дополнительные атрибуты документов, через которые можно обмениваться данными
    между системами при помощи запросов [Установить атрибуты исходящего документа  (post /outdocs/{outdoc_id}/attributes)](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_attr_set) и [Получить атрибуты исходящего документа  (get /outdocs/{outdoc_id}/attributes)](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_attr_list). 
    В качестве стандартного атрибута для этих целей используется <button popovertarget="popattr657" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">657 Информация для координации систем заказчика</button>. 

    <a name="doc_lock_desc"></a>
    #### Блокировка исходящих документов Заказчиком 
    Наличие блокировки `locked: true` на исходящем документе означает, что данные по документу загружены в систему/системы Заказчика, 
    и Исполнитель не может удалить исходящий документ. При отсутствии блокировки Исполнитель имеет возможность 
    удалить исходящий документ, например, с целью внесения исправлений.

    Для обеспечения согласованности данных в системах Исполнителя и Заказчика рекомендуется 
    в момент загрузки данных в систему Заказчика выполнять блокировку исходящего документа 
    при помощи запроса [Установить блокировку на исходящие документы (post /outdocs/lock)](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_lock). Также Заказчик должен предусмотреть в своей системе 
    возможность снятия блокировки с исходящего документа.

    Для внесения исправлений в уже заблокированный документ используется следующий сценарий:
    1. Исполнитель устанавливает в документах, требующих разблокировки, `unlock_request: true`.
    2. Заказчик получает документы, требующие разблокировки, при помощи запроса [Получить список исходящих документов  (post /outdocs/list)](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_list) с параметром `locked: true, unlock_request: true`.
    Выполняет разблокировку требуемых документов и отмену изменений, произведённых в своей системе при загрузке этих документов.
    3. Исполнитель удаляет разблокированные документы, вносит требуемые исправления и создаёт исходящие документы 
    с новыми номерами `outdoc_id` и новой датой создания `created_at`. 
    При этом дата выполнения работ `outdoc_date` указывается фактическая, та, что была в удалённых документах.
    4. Заказчик загружает новые исходящие документы к себе в систему по обычной процедуре.

    <a name="doc_option_desc"></a>
    #### Опциональные документы
    Некоторые исходящие документы используются для информирования Заказчика о промежуточных этапах выполнения работ.
    По умолчанию такие документы не создаются Исполнителем.
    Для подключения/отключения таких документов используйте элементы `outdoc_types` в запросе [Установить настройки  аккаунта (post /settings)](#tag/Nastrojki-akkaunta/operation/common_interface_settings_set).

    Список опциональных документов:
    - <button popovertarget="popdoc43" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Начата приемка товаров по заданию на оприходование (goods_supply_start)</button>
    - <button popovertarget="popdoc44" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Начат подбор товаров по заданию на отгрузку (goods_shipment_start)</button>
    - <button popovertarget="popdoc20" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Подобран товар для отгрузки (goods_shipment_ready)</button>
    - <button popovertarget="popdoc40" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Получены заказы (orders_receiving)</button>
    - <button popovertarget="popdoc41" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Заказы не обеспечены товарами (orders_deficit)</button>
    - <button popovertarget="popdoc42" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Заказы переданы в производство (orders_production_start)</button>
    - <button popovertarget="popdoc36" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Заказы спаллетированы (orders_pallet)</button>


    <a name="goods_desc"></a>
    ## Работа с товарами

    <a name="good_set_desc"></a> 
    ### Регистрация товаров
    Все товары перед физическим поступлением на склад Исполнителя должны быть зарегистрированы при помощи запроса [Создать/изменить карточки товаров (post /goods)](#tag/Tovary/operation/common_interface_good_set)

    Данные о товаре, передаваемые Исполнителю, могут меняться в системе Заказчика с течением времени, 
    поэтому важно обеспечить своевременную актуализацию этих данных в системе Исполнителя. 
    Для этого рекомендуется в системе Заказчика сделать единую функцию, которая для товара возвращает json 
    с **полным актуальным** описанием, включающим EAN штрихкоды и значения дополнительных атрибутов. 
    Использовать эту функцию в запросе [Создать/изменить карточки товаров (post /goods)](#tag/Tovary/operation/common_interface_good_set) для актуализации определённого списка товаров.

    Перед созданием входящего документа рекомендуется выполнять актуализацию всех товаров, участвующих в документе.

    Список зарегистрированных товаров можно получить при помощи запроса [Получить список товаров  (post /goods/list)](#tag/Tovary/operation/common_interface_good_list).

    Детальную информацию о конкретном товаре можно получить при помощи запроса [Информация о товаре  (get /goods/{good_id}/info)](#tag/Tovary/operation/common_interface_good_info).


    <a name="good_id_desc"></a> 
    ### Коды и названия товаров
    При обмене данными между Заказчиком и Исполнителем для идентификации товара используется код товара в системе Заказчика `good_id`
    (устоявшийся международный термин [SKU](https://ru.wikipedia.org/wiki/SKU)).
    Товары с различающимися характеристиками (модель, цвет, размер и т. п.) должны иметь различные good_id.
    Учет и движение товаров (остатки, приход, расход, отгрузка заказов) в системе Исполнителя ведётся в разрезе good_id.
    Уже заданный good_id нельзя освободить и использовать заново для другого товара. 
    Каждый товар должен получать новый код, до того никогда не использовавшийся.

    Название товара для склада `good_name` должно содержать информацию, по которой товар можно идентифицировать при приемке. 
    Наиболее полезной является информация, которая указана непосредственно на товаре (модель, размер и т. п.).
    Если в системе Заказчика характеристики товара, важные для идентификации, не являются частью названия,
    а хранятся в отдельных полях, то при передаче описания товара их нужно включить в `good_name`.

    Пример:
    * Наименование: Чайник
    * Объем: 2л
    * Цвет: Синий
    * Модель: ASFRW123

    good_name:"ASFRW123 Чайник 2л Синий"

    Название товара в печатных формах документов для клиентов может отличаться от названия товара для склада. 
    Для этого требуется указать атрибут <button popovertarget="popattr635" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">635 Публичное название товара</button>.

    <a name="qual_type_desc"></a>
    ### Качество товара 
    Часть товаров, находящихся на складе Исполнителя, может быть ненадлежащего качества, что делает их непригодными
    для обычных операций типа отгрузки в заказах. Для управления товарами с учетом их качества,
    учет и движение товаров в системе Исполнителя ведется в разрезе качества товара. Для этого используется атрибут `qual_type`, 
    принимающий значения: 
    * `useful` - нормальный товар 
    * `defective` - бракованный товар 

    Исполнитель может организовать раздельный учет и хранение бракованных товаров в разрезе согласованных с Заказчиком категорий брака.

    <a name="good_type_desc"></a>
    ### Тип номенклатурной позиции
    В номенклатурном справочнике, кроме обычных товаров, могут присутствовать позиции, которые используются для специальных
    целей. Для классификации таких целей используется атрибут `good_type`, который может принимать следующие значения:

    * `good` - Обычный товар
    * `flyer` - Листовка, нетоварная позиция, не учитывается в складских остатках в системе Исполнителя. 
    Используется в строке заказа клиента для печати персонализированных вложений в отправления (бланки возврата, накладные и т. п.),
    см. [Персонализированные вложения](#order_perso_desc)
    * `service` - Услуга, нетоварная позиция, не учитывается в складских остатках в системе Исполнителя. 
    Используется в строке заказа клиента для указания суммы сервисного сбора, скидок и т. п.
    * `advertising` - Реклама, используется по согласованию с Исполнителем для вложения в отправление рекламных материалов (каталоги, рекламные проспекты и т. п.).
    В отличие от обычного товара заказ может быть отправлен без этой позиции в случае её отсутствия на складе.
    * `pack` - Упаковка, используется по согласованию с Исполнителем как специальный материал Заказчика для упаковки отправления (брендированный короб и т. п.).


    <a name="good_dim_desc"></a>
    ### Весогабариты товара
    Весогабариты указываются для одной единицы товара в индивидуальной упаковке.

    Если весогабариты товара известны Заказчику до первого поступления товара на склад Исполнителя, то их нужно передать 
    в запросе [Создать/изменить карточки товаров (post /goods)](#tag/Tovary/operation/common_interface_good_set) 
    При этом необходимо указывать все четыре атрибута `length`, `width`, `height`, `weight`. 
    В случае если вычисленное значение плотности товара находится в диапазоне от 10 до 1600 кг/м³, 
    то переданные весогабариты записываются в карточку товара, иначе игнорируются.

    Если на момент поступления товара на склад весогабариты товара не указаны, измерение и внесение данных в систему выполняется Исполнителем.
    После этого весогабариты, передаваемые Заказчиком, игнорируются.

    <a name="gtr_desc"></a>
    ### Типоразмер товара
    Типоразмер товара `gtr_id` определяется Исполнителем на основании весо-габаритов товара, а также других характеристик, влияющих на стоимость
    операций с товаром на складе. Стоимость услуг для Заказчика зависит от типоразмера товара.
    Перечень используемых типоразмеров согласовывается между Заказчиком и Исполнителем.
    Актуальные значения используемых типоразмеров можно получить в массиве `goods_gtr` по запросу [Получить настройки  аккаунта (get /settings)](#tag/Nastrojki-akkaunta/operation/common_interface_settings_get)

    <a name="good_state_desc"></a>
    ### Состояние доступности товара
    Товар, переданный на склад Исполнителя, может находиться в различных состояниях `good_state` с точки зрения возможности его использования
    для обычных операций расхода (комплектация отправлений, отгрузка товаров и т. п.):

    * `stock` - Обычный остаток товара на складе. Доступен для использования.
    * `quarantine` - Товар помещается в карантин в случае, если он не найден на месте хранения. Состояние используется для временного
    ограничения доступности для использования. См. [Инвентаризация/коррекция товаров](#goods_corr_desc)
    * `long_storage` - Товар перемещён на длительное хранение. Не может быть использован для обычных операций расхода.
    См. [Перемещение товаров на длительное хранение](#goods_long_desc)

    <a name="good_move_desc"></a>
    ### Остатки и движение товаров
    Остатки товаров в системе Исполнителя ведутся в разрезе кода товара `good_id`, качества товара `qual_type`
    и состояния доступности `good_state`.

    <a name="doc_stocker_desc"></a>
    Основанием для изменения остатков **всегда** являются исходящие документы, которые создаются
    в момент завершения определённых операций на складе.

    Список документов, изменяющих остатки товаров:
    - <button popovertarget="popdoc9" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Товары оприходованы (goods_supply)</button>
    - <button popovertarget="popdoc2" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Полный возврат заказов (orders_full_return)</button>
    - <button popovertarget="popdoc14" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Частичный возврат заказов (orders_part_return)</button>
    - <button popovertarget="popdoc16" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Клиентский возврат заказов (orders_client_return)</button>
    - <button popovertarget="popdoc19" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Возврат товаров со склада длительного хранения (goods_from_long_storage)</button>
    - <button popovertarget="popdoc25" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Товары пееремещены на склад длительного хранения (goods_to_long_storage)</button>
    - <button popovertarget="popdoc4" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Инвентаризация-коррекция (goods_correction)</button>
    - <button popovertarget="popdoc6" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Заказы отгружены в службу доставки (orders_shipment)</button>
    - <button popovertarget="popdoc10" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Товары отгружены (goods_shipment)</button>

    Изменения остатков, связанные с исходящим документом, можно получить при помощи запроса
    <br>[Получить движение товаров по документу  (get /outdocs/{outdoc_id}/goods)](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_goods)

    Текущий остаток является суммой изменений, произведённых всеми исходящими документами.
    По запросу [Получить текущие остатки товаров  (post /goods/stock)](#tag/Tovary/operation/common_interface_good_stock_cur) можно получить текущие остатки, а также резервы товаров, связанные
    с ещё не завершёнными заданиями Заказчика.
    <br>Количества товара, доступные для будущих продаж и других расходных операций,
    являются свободным остатком и могут быть рассчитаны как текущий остаток минус резервы товара.
    <br>**Свободный остаток** = `stock` - `orders_inwork` - `orders_wait` - `shipment_picking` - `shipment_ready`

    Движение определённого товара в разрезе исходящих документов можно получить при помощи запроса
    <br>[Движение товара  (post /goods/movements)](#tag/Tovary/operation/common_interface_good_moves)

    Остатки товаров на определённую дату рассчитываются как сумма изменений, произведённых всеми исходящими документами
    до этой даты; их можно получить при помощи запроса
    <br>[Получить остатки товаров на заданную дату  (post /goods/stock/date)](#tag/Tovary/operation/common_interface_good_stock_date)

    <a name="ean_desc"></a>
    ### EAN (штрихкоды производителя) 
    EAN — штрихкод, идентифицирующий товар и производителя (см. [Википедию](https://ru.wikipedia.org/wiki/European_Article_Number)).
    Исполнитель использует EAN для идентификации поставляемого товара.
    В системе Исполнителя хранится связь между EAN и кодом товара у Заказчика `good_id`.
    В качестве EAN может быть использован любой штрихкод, нанесённый на товар.
    Одному EAN может соответствовать не более одного кода товара у Заказчика.
    С другой стороны, для одного кода товара у Заказчика может быть несколько различных EAN.

    Передача EAN выполняется массиве `eans` запроса [Создать/изменить карточки товаров (post /goods)](#tag/Tovary/operation/common_interface_good_set)

    Так же для управления EAN могут использоваться запросы
    * [Установить EAN товаров  (post /goods/eans)](#tag/Tovary/operation/common_interface_good_ean_set)
    * [Получить EAN товаров  (post /goods/eans/list)](#tag/Tovary/operation/common_interface_good_ean_list)

    Исполнитель при необходимости может самостоятельно вносить изменения в справочник EAN

    <a name="good_sn_desc"></a>
    ### Серийные номера 
    Серийный номер — это штрихкод, уникально идентифицирующий определённый **экземпляр товара**. 
    Серийные номера используются для организации поэкземплярного учёта. 
    Для этого необходимо, чтобы штрихкод серийного номера был нанесён на товар. 
    Обычно это делает производитель товара, но по согласованию с Заказчиком Исполнитель 
    может выполнить маркировку принимаемых товаров.  

    Заказчик регистрирует серийные номера товаров `good_sn`, ожидаемые к поступлению на склад Исполнителя, 
    при помощи запроса [Установить серийные номера товаров  (post /goods/serial_numbers)](#tag/Tovary/operation/common_interface_good_sn_set). 
    При поступлении товаров на склад Исполнитель сканирует серийный номер и обеспечивает учёт товаров в своей системе 
    в разрезе серийных номеров. 

    Для товаров, обязательных для учёта в разрезе серийных номеров, Заказчик должен установить атрибут товара 
    <br><button popovertarget="popattr268" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">268 Обязательность указания серийного номера товара при приемке</button>

    Для управления серийными номерами могут использоваться запросы
    * [Получить движение серийных номеров по документу  (get /outdocs/{outdoc_id}/good_sn)](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_good_sn)
    * [Получить серийные номера товаров  (post /goods/serial_numbers/list)](#tag/Tovary/operation/common_interface_good_sn_list)
    * [Информация о серийном номере  (get /goods/serial_numbers/{good_sn}/info)](#tag/Tovary/operation/common_interface_good_sn_info)

    <a name="sn_pool_desc"></a>
    #### Пул серийных номеров 
    Пул серийных номеров предназначен для использования определённых серийных номеров в определённых документах поставки.
    Для этого при регистрации серийных номеров при помощи запроса [Установить серийные номера товаров  (post /goods/serial_numbers)](#tag/Tovary/operation/common_interface_good_sn_set) указывается атрибут `sn_pool`, который 
    объединяет серийные номера в группу. Далее номер созданного пула указывается в одном или нескольких документах <button popovertarget="popdoc1" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на оприходование товаров (goods_supply_task)</button> 
    в атрибуте <button popovertarget="popattr305" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">305 Пул серийных номеров для маркировки поставки</button>. При приёмке по таким документам Исполнителем может быть выполнена маркировка немаркированных 
    товаров серийными номерами из соответствующего пула. Также по требованию Заказчика может быть запрещена приёмка серийных номеров, 
    не указанных в пуле. Кроме этого, по согласованию с Заказчиком Исполнитель может выполнять маркировку немаркированных складских остатков
    серийными номерами согласованного пула.

    #### Честный знак
    Работа с кодами маркировки «Честный знак» выполняется через механизм серийных номеров.
    Серийные номера, передаваемые в виде контрольного идентификационного знака (КИЗ) системы «Честный знак» (ЧЗ),
    должны соответствовать формату системы ЧЗ (см. [Описание структуры кодов датаматрикс](https://xn--80ajghhoc2aj1c8b.xn--p1ai/upload/%D0%A1%D1%82%D1%80%D1%83%D0%BA%D1%82%D1%83%D1%80%D0%B0%20DataMatrix.pdf))
    и могут быть представлены в двух видах:
    * короткий КИЗ — идентификатор экземпляра по системе ЧЗ без кода проверки (криптохвоста)
    * полный КИЗ — расширенный идентификатор экземпляра с контрольным ключом и контрольным кодом (криптохвостом)

    Следует избегать передачи серийных номеров одного и того же экземпляра одновременно в виде короткого и полного КИЗ.
    При передаче полного КИЗ данные по короткому КИЗ, переданному ранее, будут удалены из системы, если он ещё не использовался для приёмки.

    Серийные номера должны передаваться без специальных символов (`<GS>` (ASCII 1D hex), `<FNC1>` (ASCII E8 hex)),
    а также скобок вокруг групп данных.

    Примеры: 
    * `0108712079158286215iFLSB3Qh=LWj91FFD092dGVzdKyuN84WyIqEhd7WtrYjZtIAMCb65YTquIbL5TE=` - полный КИЗ
    * `0108712079158286215iFLSB3Qh=LWj` - короткий КИЗ


    <a name="recognition_desc"></a>
    ### Идентификация неизвестных товаров 
    При приемке для идентификации товаров используются штрихкоды, которыми отмаркированы товары. 
    Это может быть [EAN](#ean_desc) или [серийный номер](#good_sn_desc).

    В случае получения Исполнителем товаров, которые не отмаркированы или отмаркированы неизвестными штрихкодами, 
    Исполнитель принимает их по временным кодам для неизвестных товаров.
    Для каждого неизвестного товара выполняется описание, фотографирование, измерение и взвешивание. 

    Данные о неизвестных товарах Заказчик может получить с помощью запроса [Товары требующие идентификации  (get /goods/recognition)](#tag/Tovary/operation/common_interface_good_recognition_list).
    На основании полученной информации Заказчик идентифицирует неизвестный товар, 
    создаёт при необходимости карточку нового товара при помощи запроса [Создать/изменить карточки товаров (post /goods)](#tag/Tovary/operation/common_interface_good_set)
    и передаёт соответствие между неизвестным товаром и товаром Заказчика при помощи запроса [Идентифицировать товары  (post /goods/recognition)](#tag/Tovary/operation/common_interface_good_recognition_set).

    Если Заказчик в запросе [Установить EAN товаров  (post /goods/eans)](#tag/Tovary/operation/common_interface_good_ean_set) передаёт EAN, который используется
    для неизвестного товара (атрибут `items.barcode` из запроса [Товары требующие идентификации  (get /goods/recognition)](#tag/Tovary/operation/common_interface_good_recognition_list)), 
    идентификация товара выполняется автоматически. В этом случае запрос [Идентифицировать товары  (post /goods/recognition)](#tag/Tovary/operation/common_interface_good_recognition_set) выполнять не требуется.

    Документ приёмки товаров не может быть завершён Исполнителем, пока все неизвестные товары не будут идентифицированы. 

    По согласованию Исполнитель может отправлять письма на электронную почту Заказчика с информацией о товарах, требующих идентификации. 

    <a name="expir_desc"></a>
    ### Учет товаров по срокам годности 
    Учет товаров по срокам годности требует подключения специальной опции, см. атрибут `goods_expir_enabled` в запросе [Получить настройки  аккаунта (get /settings)](#tag/Nastrojki-akkaunta/operation/common_interface_settings_get).
    Для включения этой опции на вашем аккаунте обратитесь к менеджеру Исполнителя. 

    Для товаров, обязательных для учета по срокам годности, Заказчик до передачи товара на склад должен установить атрибут товара 
    <br><button popovertarget="popattr29" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">29 Учет по сроку годности</button>

    Дополнительно можно указать атрибуты товара:
    * <button popovertarget="popattr346" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">346 Минимальное количество дней до истечения срока годности для приемки товара как норма</button> 
    * <button popovertarget="popattr347" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">347 Минимальное количество дней до истечения срока годности для отгрузки товара в заказах</button> 
    * <button popovertarget="popattr176" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">176 Дней годности</button> 

    При комплектации заказов и отгрузке товаров Исполнитель в первую очередь отбирает товары с наименьшим сроком годности.

    Для документов отгрузки товаров, для которых требуется учитывать ограничения по сроку годности, так же, как для отгрузки клиентам,
    нужно установить атрибут <button popovertarget="popattr370" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">370 Режим подбора по сроку годности</button> 

    Текущие остатки товаров, учитываемых по срокам годности, можно получить с помощью запроса
    <br>[Получить текущие остатки товаров со сроками годности  (post /goods/stock/expiry)](#tag/Tovary/operation/common_interface_good_stock_expir)


    <a name="good_photo_desc"></a>
    ### Фото товаров 
    По согласованию с Исполнителем Заказчик может передать фото товаров в запросе [Загрузить фото товаров  (post /goods/photos)](#tag/Tovary/operation/common_interface_good_photo_set).
    Перед сохранением фото в карточку товара выполняется преобразование в `jpg`, сжатие до размера 800×600 и дедупликация.

    Исполнитель по согласованию с Заказчиком может выполнять фотографирование всех поступающих товаров.

    В документе <button popovertarget="popdoc1" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на оприходование товаров (goods_supply_task)</button> Заказчик может указать атрибут <button popovertarget="popattr541" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">541 Требуется фото товаров по документу</button> для получения фото поступивших товаров. 

    Список фото товаров можно получить по запросу [Получить фото товаров  (post /goods/photos/list)](#tag/Tovary/operation/common_interface_good_photo_list).


    <a name="bkind_desc"></a>
    ### Зонирование товаров 
    Если товары Заказчика требуют особых условий хранения, Исполнителем по согласованию с Заказчиком может быть 
    организовано хранение этих товаров в специальных зонах, например, вешальное хранение, продукты питания и т. п.

    Для товаров Заказчика, которые требуют особых условий хранения, должен быть установлен атрибут <button popovertarget="popattr79" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">79 Категория зонирования товара</button>
    <br>Передача этого атрибута должна быть сделана до поступления товара на склад Исполнителя. 
    Изменение этого атрибута со стороны Заказчика возможно только для товаров, которые еще не размещены на складе Исполнителя. 

    Список доступных категорий зонирования товаров можно получить в массиве `goods_zoning` по запросу [Получить настройки  аккаунта (get /settings)](#tag/Nastrojki-akkaunta/operation/common_interface_settings_get).

    <a name="goods_corr_desc"></a>
    ### Инвентаризация/коррекция товаров 

    В процессе работы Исполнитель может выявить расхождения по количеству и качеству товаров хранящихся на складе.
    Для приведения в соответствие остатков в учетной системе и фактических остатков Исполнитель создает документ <button popovertarget="popdoc4" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Инвентаризация-коррекция (goods_correction)</button>
    в котором фиксирует выявленные расхождения. 

    Товар, не найденный на складе, списывается с доступного остатка и переводится в состояние карантин, что фиксируется в поле `goods.quarantine_qnt`. 
    Общее накопленное количество таких списаний с момента последней полной инвентаризации можно получить в поле `items.quarantine` 
    по запросу [Получить текущие остатки товаров  (post /goods/stock)](#tag/Tovary/operation/common_interface_good_stock_cur).
    После проведения полной плановой инвентаризации товаров Заказчика создается финальный документ инвентаризации с 
    correction_type = `quarantine_reset`, в котором фиксируются накопленные расхождения. 

    <a name="goods_supply_desc"></a>
    ### Поставка товаров на склад Исполнителя 

    #### Стандартный процесс

    1. Заказчик создает входящий документ <button popovertarget="popdoc1" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на оприходование товаров (goods_supply_task)</button> в котором указывает товары, планируемые к поставке.
    Создание документа должно выполняться Заказчиком до момента поступления товара на склад Исполнителя,
    но только после того, как ему стали известны реальные количества товара, ожидаемые в поставке.
    <br>Все товары, участвующие в поставке, должны быть зарегистрированы и актуализированы, см. [Регистрация товаров](good_set_desc).
    <br>В документе указываются необходимые атрибуты из справочника [Атрибуты документа поставки](#doc3_attrs)

    2. В момент прибытия поставки на склад Исполнитель создает исходящий документ <button popovertarget="popdoc43" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Начата приемка товаров по заданию на оприходование (goods_supply_start)</button>

    3. После завершения приемки товаров и размещения их на постоянных местах хранения Исполнитель создает исходящий документ <button popovertarget="popdoc9" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Товары оприходованы (goods_supply)</button>
    в котором указывает фактически принятые количества, качество товара, сроки годности и серийные номера.

    Замечания:
    * Заказчик может удалить созданный входящий документ до момента прибытия поставки на склад при помощи запроса [Удалить входящий документ  (delete /indocs/{indoc_id})](#tag/Vhodyashie-dokumenty/operation/common_interface_indoc_delete)

    * Заказчик может изменить атрибуты ранее созданного документа отдельным запросом [Установить атрибуты входящего документа  (post /indocs/{indoc_id}/attributes)](#tag/Vhodyashie-dokumenty/operation/common_interface_indoc_attr_set). Исполнитель учитывает эти 
    изменения в зависимости от стадии приемки товаров.

    <a name="goods_izl_desc"></a>
    #### Излишки товара
    Порядок работы с товарами, поставленными сверх плана, указанного в документе <button popovertarget="popdoc1" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на оприходование товаров (goods_supply_task)</button>, регулируется
    атрибутом <button popovertarget="popattr350" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">350 Возможность принимать излишки товаров</button>. Если атрибут документа не установлен, то используется значение по умолчанию,
    согласованное с Заказчиком (можно получить в атрибуте `goods_surplus_enabled` по запросу [Получить настройки  аккаунта (get /settings)](#tag/Nastrojki-akkaunta/operation/common_interface_settings_get)).

    * `true` — обнаруженные излишки принимаются внутри документа поставки вместе с обычным товаром.
    * `false` — обнаруженные излишки товара принимаются отдельным документом <button popovertarget="popdoc9" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Товары оприходованы (goods_supply)</button>, в котором устанавливается атрибут <button popovertarget="popattr624" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">624 Задание на оприходование по которому были обнаружены излишки</button>.


    <a name="goods_timeout_desc"></a>
    #### Непоставленные товары 
    В случае если в течение 60 дней (конкретное значение может быть согласовано) после создания документа <button popovertarget="popdoc1" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на оприходование товаров (goods_supply_task)</button>
    товар не поступил на склад, Исполнитель создает исходящий документ <button popovertarget="popdoc9" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Товары оприходованы (goods_supply)</button>, в котором указывает атрибут <button popovertarget="popattr306" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">306 Истек срок ожидания поставки</button>
    и **нулевые** принятые количества для информирования Заказчика о том, что поставка больше не ожидается.

    <a name="goods_inpart_desc"></a>
    #### Приёмка товаров частями 
    Приёмка товаров на складе Исполнителя по большой поставке может занимать длительное время. 
    До момента её завершения принятый товар не отображается в остатках и недоступен для использования.
    По согласованию с Заказчиком Исполнителем может быть организована приёмка товара частями.
    В этом случае по мере оприходования товаров Исполнитель создаёт отдельные документы <button popovertarget="popdoc9" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Товары оприходованы (goods_supply)</button>  
    Это позволяет Заказчику увидеть принятый товар и передать его в работу, не дожидаясь завершения приёмки по всему заданию.

    Во всех документах частичной приёмки, кроме последнего, указывается атрибут <button popovertarget="popattr9" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">9 Порядковый номер частичной приемки</button> 
    В последнем документе этот атрибут не указывается. Это служит признаком, что приёмка товаров завершена полностью, 
    и других документов Исполнителя по этому заданию на оприходование не ожидается.


    <a name="goods_shipment_desc"></a>
    ### Отгрузка товаров со склада Исполнителя 

    <a name="goods_shipment_prepare_desc"></a>
    #### Подготовка товаров для отгрузки 

    Исполнитель размещает подобранные для отгрузки товары в короба. 
    Для идентификации короба используются атрибут `pallets.boxes.box_id`, возвращаемый в исходящих документах  
    <button popovertarget="popdoc20" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Подобран товар для отгрузки (goods_shipment_ready)</button> и <button popovertarget="popdoc10" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Товары отгружены (goods_shipment)</button>. 
    В массиве `pallets.boxes.goods` указываются товары размещенные в коробе.

    По согласованию с Заказчиком Исполнитель фиксирует размещение подобранных коробов на отгружаемых паллетах.
    Для идентификации паллет используется атрибут `pallets.pallet_id`. В массиве `pallets.boxes` указываются короба размещенные на паллете.
    Если информация о размещении подобранных коробов на паллетах не требуется, атрибут `pallets.pallet_id` не заполняется.

    Обычно короб маркируется небольшой этикеткой, содержащей два штрихкода, которые указываются в атрибутах 
    `pallets.boxes.box_upper_barcode` и `pallets.boxes.box_lower_barcode`. 
    Для маркировки паллеты используются этикетки размера А4 того же вида, что и для маркировки коробов. 
    Штрихкоды паллеты указываются в атрибутах `pallets.plt_upper_barcode` и `pallets.plt_lower_barcode`. 

    ![Пример этикетки для маркировки короба/паллеты](https://lpw.betta.ru:8084/img/box_label.jpg "Этикетка для маркировки короба/паллеты")

    По согласованию с Заказчиком Исполнитель может выполнять маркировку товаров, коробов и паллет 
    согласно специальным требованиям Заказчика см. [Отгрузка товаров по схеме FBO](#fbo_desc).


    #### Стандартный процесс

    1. Заказчик создает входящий документ <button popovertarget="popdoc3" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на отгрузку товаров (goods_shipment_task)</button> в котором указывает товары планируемые к отгрузке. 
    <br>Все товары участвующие в отгрузке должны быть актуализированы см. [Регистрация товаров](good_set_desc).
    <br>В документе указываются необходимые атрибуты из справочника [Атрибуты документа отгрузки товаров](#doc2_attrs) 

    2. В момент начала работ по подбору требуемых товаров Исполнитель создает документ <button popovertarget="popdoc44" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Начат подбор товаров по заданию на отгрузку (goods_shipment_start)</button> 

    3. После завершения подбора товаров Исполнитель создает документ <button popovertarget="popdoc20" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Подобран товар для отгрузки (goods_shipment_ready)</button>, в котором указываются фактически подобранные
    количества с указанием сроков годности и серийных номеров. Состав подобранных коробов блокируется от дальнейшего изменения.

    4. При необходимости Заказчик, на основании информации, полученной в документе <button popovertarget="popdoc20" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Подобран товар для отгрузки (goods_shipment_ready)</button>, 
    подготавливает и передает Исполнителю дополнительную информацию, необходимую для фактической отгрузки товаров.

    5. После фактической отгрузки товаров со склада Исполнителя создается исходящий документ <button popovertarget="popdoc10" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Товары отгружены (goods_shipment)</button>, 
    который завершает работы по заданию Заказчика.

    Замечания:
    * Заказчик может удалить созданный входящий документ до начала подбора товаров на складе при помощи запроса [Удалить входящий документ  (delete /indocs/{indoc_id})](#tag/Vhodyashie-dokumenty/operation/common_interface_indoc_delete)

    * Заказчик может изменить атрибуты ранее созданного документа отдельным запросом [Установить атрибуты входящего документа  (post /indocs/{indoc_id}/attributes)](#tag/Vhodyashie-dokumenty/operation/common_interface_indoc_attr_set). Исполнитель учитывает эти
    изменения в зависимости от стадии подбора товаров.

    <a name="fbo_desc"></a>
    ### Отгрузка товаров по схеме FBO 
    ***FBO*** (Fulfillment by Operator) — схема работы на маркетплейсах, при которой продавец передаёт свои товары на склад площадки, 
    а она берёт на себя работу, связанную с хранением, упаковкой и доставкой заказов. 

    В контексте системы FBox термин ***FBO*** определяет требования к подготовке товаров на складе Исполнителя для отгрузки.
    Эти требования включают в себя:
    * Требования к маркировке отгружаемых товаров, коробов и паллет.   
    * Максимальный вес короба.
    * Необходимость взвешивания коробов.
    * Обязательность размещения подобранных коробов на паллеты.
    * Необходимость использовать монокороба (короб может содержать только одно наименование товара).
    * Другие требования...

    Типичный вариант использования отгрузки по схеме FBO — это передача товаров со склада Исполнителя на склад маркетплейса.
    Кроме этого, схема FBO может использоваться: 
    * для перемещения товаров на склад длительного хранения, см. [Перемещение товаров на длительное хранение](#goods_long_desc).
    * для отгрузки товаров Заказчика на сторону со специальными требованиями по подготовке товаров к отгрузке. 

    Заказчик согласовывает с Исполнителем набор требований для каждого варианта использования (отгрузка в Озон, отгрузка в WB и т. п.). 
    Каждый согласованный набор требований Исполнитель фиксирует у себя в системе и назначает ему идентификатор режима FBO `fbo_mode`.
    Список доступных для Заказчика режимов отгрузки можно получить в массиве `fbo_modes` по запросу [Получить настройки  аккаунта (get /settings)](#tag/Nastrojki-akkaunta/operation/common_interface_settings_get).

    Для отгрузки товаров в соответствии с согласованными требованиями Заказчик в документе <button popovertarget="popdoc3" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на отгрузку товаров (goods_shipment_task)</button>
    указывает `fbo_mode` в атрибуте документа <br><button popovertarget="popattr366" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">366 FBO Режим отгрузки по схеме FBO</button>

    Для конкретного задания на отгрузку Заказчик может изменить согласованные с Исполнителем требования, указав атрибуты документа
    * <button popovertarget="popattr567" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">567 FBO Маркируются только паллеты</button>
    * <button popovertarget="popattr428" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">428 FBO Использовать монокороба для отгрузки</button>
    * <button popovertarget="popattr427" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">427 FBO Одинаковая кратность товаров в коробах для отгрузки</button>

    <a name="fbo_info_desc"></a>
    #### Дополнительная информация для FBO 
    Для определённых режимов отгрузки от Заказчика может потребоваться дополнительная информация,
    которая зависит от фактически подобранных товаров, сформированных коробов и палет. 
    Например, для маркировки коробов требуются штрихкоды, которые Заказчик может получить в маркетплейсе, указав нужное количество и/или состав.

    Необходимость предоставления такой информации можно получить в атрибуте `fbo_modes.fbo_info_need` по запросу [Получить настройки  аккаунта (get /settings)](#tag/Nastrojki-akkaunta/operation/common_interface_settings_get).

    Для передачи дополнительной информации используется следующий сценарий взаимодействия:

    1. Заказчик получает документы при помощи запроса [Получить список документов ожидающих дополнительной информации перед отгрузкой  (get /fbo/info/wait)](#tag/Otgruzka-tovarov-dlya-FBO/operation/common_interface_fbo_info_wait)

    2. По исходящему документу завершения подбора товаров, указанному в атрибуте `goods_shipment_tasks.goods_shipment_ready_outdoc_id`, 
    Заказчик получает информацию о фактически подобранных товарах при помощи запроса [Получить содержимое исходящего документа  (get /outdocs/{outdoc_id})](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_data)

    3. На основании этой информации Заказчик подготавливает и передаёт Исполнителю дополнительную информацию при помощи запросов
    * [Передать штриходы коробов/паллет для маркировки (post /fbo/info/boxes)](#tag/Otgruzka-tovarov-dlya-FBO/operation/common_interface_fbo_info_boxes)
    * [Передать PDF файлы для исходящего документа  (post /outdocs/{outdoc_id}/files)](#tag/Ishodyashie-dokumenty/operation/common_interface_outdoc_file_set)  

    4. После того, как передана вся необходимая информация, Заказчик выполняет запрос [Завершить передачу дополнительной информации перед отгрузкой  (post /fbo/info/complete)](#tag/Otgruzka-tovarov-dlya-FBO/operation/common_interface_fbo_info_complete)

    5. Исполнитель после завершения передачи дополнительной информации Заказчиком выполняет маркировку и отгрузку.

    <a name="goods_long_desc"></a>
    ### Перемещение товаров на длительное хранение 

    Перемещение товаров на длительное хранение предназначено для оптимизации затрат по хранению 
    малооборачиваемых товаров. Перемещенные товары исключаются из остатка, доступного для обычных операций
    (отгрузка заказов, отгрузка товаров). Возврат товаров на обычное хранение может быть выполнен 
    только **целыми** коробами, в которых товар был перемещен на склад длительного хранения.

    #### Порядок работы
    1. Заказчик согласовывает с Исполнителем условия и порядок использования склада длительного хранения. 
    По результатам согласования Исполнитель назначает идентификатор режима FBO `fbo_mode`, который Заказчик должен использовать 
    для перемещения товаров, см. [Отгрузка товаров по схеме FBO](#fbo_desc)

    2. Для перемещения товаров Заказчик создает документ <button popovertarget="popdoc3" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на отгрузку товаров (goods_shipment_task)</button>. 
    В атрибуте <button popovertarget="popattr366" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">366 FBO Режим отгрузки по схеме FBO</button> указывает согласованный `fbo_mode`.

    3. После перемещения товаров Исполнитель создает документ <button popovertarget="popdoc25" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Товары пееремещены на склад длительного хранения (goods_to_long_storage)</button>. 
    В массиве `boxes` указывается список перемещенных коробов и их состав.

    4. Для возврата товаров со склада длительного хранения Заказчик выбирает короба, содержащие требуемые товары. 
    Для этого можно использовать запрос [Товары находящиеся на длительном хранении (get /goods/long_storage)](#tag/Tovary/operation/common_interface_good_long_storage). 
    Короба для возврата не должны быть ранее запрошены: `boxes.requested: false`.
    Далее Заказчик создаёт документ <button popovertarget="popdoc21" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на возврат товаров со склада длительного хранения (goods_from_long_storage_task)</button>, где в массиве `box_ids` указывается список коробов для возврата.  

    5. После фактического возврата товаров Исполнитель создаёт документ <button popovertarget="popdoc19" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Возврат товаров со склада длительного хранения (goods_from_long_storage)</button>, в котором указывается 
    список возвращённых коробов и их состав.

    <a name="goods_xow_desc"></a>
    ### Перемещение товара между аккаунтами 
    На складе Исполнителя товары, принадлежащие разным аккаунтам, хранятся отдельно.
    Если Заказчик использует два или более аккаунтов, может потребоваться перемещение товара между аккаунтами.
    Для этого Заказчик создает <button popovertarget="popdoc1" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на оприходование товаров (goods_supply_task)</button> в аккаунте, на который должны быть перемещены товары.

    В документе необходимо указать атрибут <button popovertarget="popattr128" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">128 Аккаунт с которого перемещается товар</button>. 

    А в случае перемещения брака указать атрибут <button popovertarget="popattr135" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">135 Качество товара которое требуется при перемещении с другого аккаунта</button>. 

    По мере перемещения товаров между аккаунтами Исполнитель создает пары документов
     * <button popovertarget="popdoc10" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Товары отгружены (goods_shipment)</button> на аккаунте, с которого перемещены товары. 
     * <button popovertarget="popdoc9" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Товары оприходованы (goods_supply)</button> на аккаунт, на который перемещены товары

    По согласованию с Заказчиком Исполнитель может перемещать товары с другого аккаунта без документа Заказчика <button popovertarget="popdoc1" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на оприходование товаров (goods_supply_task)</button>.
    В этом случае в документе <button popovertarget="popdoc9" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Товары оприходованы (goods_supply)</button> указывается атрибут <button popovertarget="popattr143" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">143 Аккаунт с которого перемещены товары</button>. 

    <a name="orders_desc"></a>
    ## Работа с заказами 

    Заказчик передает заказы для отгрузки в документе <button popovertarget="popdoc5" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на отгрузку заказов (orders_shipment_task)</button>. 
    Также можно использовать метод [Создать заказы  (post /orders)](#tag/Zakazy/operation/common_interface_order_create) который создает документ автоматически.
    При работе с маркетплейсами Исполнитель может самостоятельно запрашивать заказы через API маркетплейса, 
    создавать документ <button popovertarget="popdoc5" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на отгрузку заказов (orders_shipment_task)</button>.

    <a name="order_struct_desc"></a>
    ### Структура данных передаваемого заказа
    Информация о заказах передается в массиве `orders`. Обязательными атрибутами заказа являются 
    уникальный идентификатор заказа `order_id` и идентификатор службы доставки `delivery_id`.
    Заполнение других полей зависит от выбранной службы доставки и других условий. 

    Для удобства вся информация о заказе разбита на несколько разделов:

    * `goods` - Список позиций заказа. В разделе содержится информация о товарных позициях, которые Исполнитель должен разместить в отправление. 
    Также здесь указываются специальные позиции, отвечающие за печать персонализированных вложений, ценообразование и т.п. см. [Тип номенклатурной позиции](#good_type_desc)

    * `delivery` - Параметры доставки. Набор универсальных атрибутов, которые могут быть использованы различными службами доставки.
    Применимость тех или иных атрибутов к конкретной службе доставки см. [Справочник служб доставки](#deliveries)

    * `client` - Информация о получателе 

    * `address` - Адрес доставки 

    * `control` - Технологическая информация для Исполнителя 

    * `files` - Файлы для печати. К заказу можно прикрепить один или несколько pdf файлов, 
    которые будут распечатаны Исполнителем и вложены в отправление или использованы в качестве адресного ярлыка.

    * `cons` - Данные по отправлению для консолидации см. [Консолидация отправлений](#order_cons_desc)

    * `forwarded_parcels` - Список отправлений для пересылки см. [Пересылка отправлений](#mail_forward_desc)

    * `devXXX` - Информация, специфичная для конкретной службы доставки. 
    В разделах devXXX указываются параметры, используемые только конкретной службой доставки с delivery_id = XXX

    <a name="delivery_desc"></a>
    ### Службы доставки
    Использование той или иной службы доставки должно быть согласовано между Заказчиком и Исполнителем до момента передачи заказов.
    По результатам согласования Исполнитель делает необходимые настройки в системе для отправки заказов Исполнителя через 
    выбранную службу доставки. Список доступных для Заказчика служб доставки можно получить в массиве `deliveries` 
    по запросу [Получить настройки  аккаунта (get /settings)](#tag/Nastrojki-akkaunta/operation/common_interface_settings_get).

    Требования к данным, передаваемым в запросе [Создать заказы  (post /orders)](#tag/Zakazy/operation/common_interface_order_create), могут отличаться в зависимости от выбранной службы доставки. 
    В разделах `devXXX` указывается информация, специфичная для конкретной службы доставки *delivery_id = XXX*.
    В разделе `delivery` указывается информация, которая может быть использована различными службами доставки.
    Порядок заполнения тех или иных атрибутов необходимо уточнять у Исполнителя.
    Особенности использования службы доставки см. [Справочник служб доставки](#deliveries) 

    <a name="order_obr_desc"></a>
    ### Процесс обработки заказов 

    1. По заказам, полученным Исполнителем, создается исходящий документ <button popovertarget="popdoc40" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Получены заказы (orders_receiving)</button>

    2. Полученные заказы попадают в пул заказов, не переданных в производство. 
    С периодичностью раз в 5 мин. выполняется обработка заказов из пула. 
    Из обработки исключаются фиктивные заказы `orders.control.is_fake_order: true` 
    и заказы с отложенной датой отгрузки `orders.control.to_delivery_date` см документ <button popovertarget="popdoc5" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на отгрузку заказов (orders_shipment_task)</button>.
     
        2.1. Заказы, обеспеченные остатками товаров на складе, передаются в производство, при этом создается документ <button popovertarget="popdoc42" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Заказы переданы в производство (orders_production_start)</button>. 

        2.2. Если заказ не обеспечен остатками товаров на складе, создается исходящий документ <button popovertarget="popdoc41" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Заказы не обеспечены товарами (orders_deficit)</button>. 

    3. По заказам, переданным в производство, выполняется предварительная регистрация в службе доставки. 
    Служба доставки проверяет полученные данные о заказе. 

        3.1. В случае невозможности доставки заказа служба доставки возвращает причину отказа. 
        Такие заказы аннулируются в системе Исполнителя и создается исходящий документ <button popovertarget="popdoc15" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Заказы аннулированы (orders_cancel)</button>. 
        В документе указывается причина отказа, полученная от службы доставки.
        Заказчик анализирует причины отказа и передает заказ повторно после их устранения.

        3.2. Заказы, успешно прошедшие проверку в службе доставки, передаются на комплектацию.

    4. Исполнитель выполняет комплектацию заказов. При необходимости в службу доставки передается информация, 
    полученная после комплектации (количество мест в заказе, фактический вес, серийные номера товаров и т.п.).
    Скомплектованные заказы размещаются на паллеты. 
    После завершения формирования паллеты создается исходящий документ <button popovertarget="popdoc36" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Заказы спаллетированы (orders_pallet)</button>. 

    5. В момент фактической отгрузки заказов в службу доставки создается исходящий документ <button popovertarget="popdoc6" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Заказы отгружены в службу доставки (orders_shipment)</button>.

    6. Служба доставки может отказаться принять заказ в доставку из-за нарушений требований к упаковке или другим причинам и 
    вернуть заказ на склад Исполнителя. В этом случае возвращенные заказы исключаются из документов <button popovertarget="popdoc6" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Заказы отгружены в службу доставки (orders_shipment)</button>, <button popovertarget="popdoc36" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Заказы спаллетированы (orders_pallet)</button>
    и переходят в состояние *комплектация* (пункт 4). 
    <br>В случае, если к моменту получения заказов из службы доставки документ <button popovertarget="popdoc6" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Заказы отгружены в службу доставки (orders_shipment)</button> был заблокирован Заказчиком, 
    Исполнитель создает документ <button popovertarget="popdoc24" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Отказ службы доставки в приеме заказов (orders_shipment_refusal)</button> в котором информирует Заказчика об отмене отгрузки заказов. 
    На основании этой информации Заказчик корректирует данные об отмененных заказах в своей учетной системе, 
    так чтобы они соответствовали состоянию *комплектация* (пункт 4). 

    <a name="order_cancel_desc"></a>
    ### Отмена заказов 

    При необходимости отменить отгрузку ранее переданных заказов Исполнитель использует запрос [Отменить заказы  (post /orders/cancel)](#tag/Zakazy/operation/common_interface_order_cancel).
    Заказы, переданные в запросе, помечаются в системе Исполнителя как требующие отмены.
    В зависимости от стадии обработки заказа возможны следующие сценарии:

    1. Если по заказу еще не начата комплектация (см. Процесс обработки заказов пункт 4), отмена заказа выполняется сразу. 
    При этом создается исходящий документ <button popovertarget="popdoc15" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Заказы аннулированы (orders_cancel)</button>. Номер исходящего документа возвращается в поле `orders.cancel_outdoc_id`.

    2. Если заказ находится в комплектации, но еще не размещен на паллету, в момент размещения на паллету 
    заказы, требующие отмены, исключаются из дальнейшей обработки и по ним создается документ <button popovertarget="popdoc15" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Заказы аннулированы (orders_cancel)</button>.

    3. Если заказ размещен на паллету, но еще не отгружен, заказы, требующие отмены, удаляются с паллеты 
    и исключаются из дальнейшей обработки. По ним создается документ <button popovertarget="popdoc15" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Заказы аннулированы (orders_cancel)</button>. 

    4. Если заказ уже отгружен, в службу доставки направляется уведомление о необходимости отмены доставки и возврата заказа.
    При этом документ <button popovertarget="popdoc15" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Заказы аннулированы (orders_cancel)</button> не создается.

    По согласованию, может быть определена стадия обработки заказа 
    после которой отмена заказа не выполняется, а запрос [Отменить заказы  (post /orders/cancel)](#tag/Zakazy/operation/common_interface_order_cancel) возвращает ошибку.

    Заказы, отмененные на стадиях 2. и 3., включаются в биллинг услуг, оказанных Исполнителем Заказчику.

    Для внесения изменений в уже переданный заказ должна использоваться отмена заказа.
    После отмены заказ может быть создан повторно с тем же номером `order_id`.

    <a name="order_ret_desc"></a>
    ### Возвраты заказов
    Отгруженные заказы могут быть возвращены на склад Исполнителя. 
    В зависимости от причин Исполнителем создаются следующие исходящие документы: 

    1. <button popovertarget="popdoc2" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Полный возврат заказов (orders_full_return)</button> - документ создается Исполнителем в случае, если служба доставки возвратила заказ на склад Исполнителя 
    **без нарушения целостности упаковки**. Как правило, это возникает при невозможности доставить заказ клиенту. 
    В этом случае ответственность за соответствие принятых и отгруженных товаров в заказе несет Исполнитель. 
    Товары, отгруженные в заказе, но не принятые при возврате, помещаются в карантин см. [Состояние доступности товара](#good_state_desc)

    2. <button popovertarget="popdoc14" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Частичный возврат заказов (orders_part_return)</button> - документ создается Исполнителем в случае, если служба доставки возвратила заказ на склад Исполнителя 
    **с нарушением целостности упаковки**. Как правило, это означает частичный выкуп заказа клиентом, 
    но также может быть связано с осмотром содержимого и отказом от покупки или другими причинами.
    В этом случае Исполнитель не несет ответственность за соответствие принятых и отгруженных товаров в заказе.
    На склад оприходуются товары, фактически полученные в возвращенном заказе. 
    <br>Некоторые службы доставки и маркетплейсы могут возвращать недоставленные товары из одного заказа несколькими партиями в разные дни.
    В этом случае заказ будет присутствовать в нескольких документах частичного возврата.

    3. <button popovertarget="popdoc16" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Клиентский возврат заказов (orders_client_return)</button> - документ создается Исполнителем после получения товаров, выкупленных и возвращенных клиентом.
    Оприходование возврата осуществляется по следующей схеме:
    <br>Исполнитель получает отправление от клиента, содержащее возвращаемые товары, бланк возврата, а также другие бумажные документы.
    По отправлению Исполнитель создает клиентский возврат и присваивает ему штриховой идентификатор `return_barcode`.
    В атрибуте `parcel_barcode` фиксируется номер отправления, полученного от клиента.
    При наличии бланка возврата выполняется идентификация заказа, в котором товар был отгружен клиенту, и заполняется атрибут `order_id`.
    По согласованию с Заказчиком Исполнитель фотографирует все принятые товары, а также бумажные документы содержащиеся в клиентском возврате.

    <a name="order_pay_desc"></a>
    ### Оплаты заказов
    Если взаимодействие со службой доставки выполняется по договору, заключенному между Исполнителем и службой доставки,
    Исполнитель после получения от службы доставки информации об оплате заказа клиентом создает документ <button popovertarget="popdoc8" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Оплата заказов (orders_payment)</button>. 
    <br>После получения наложенного платежа от службы доставки и перечисления Заказчику Исполнитель создает документ <button popovertarget="popdoc18" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Перечисление наложенного платежа (orders_payment_transfer)</button>. 

    <a name="order_perso_desc"></a>
    ### Персонализированные вложения 
    Механизм персонализированных вложений предназначен для печати и размещения в заказе накладных, бланков возврата 
    и других печатных материалов (листовок), содержащих данные о клиенте, составе заказа и т. п.

    Шаги реализации:

    1. Заказчик и Исполнитель согласуют макет листовки и параметры персонализации. 
    При необходимости определяются дополнительные элементы в разделе персонализации позиции заказа `orders.goods.perso` 
    документа <button popovertarget="popdoc5" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на отгрузку заказов (orders_shipment_task)</button>

    2. Заказчик создает соответствующую номенклатурную позицию с типом good_type = `flyer`

    3. Исполнитель формирует макет листовки и предоставляет Заказчику образцы.

    4. После завершения согласования Исполнитель включает листовку в заказы. 
    Для этого в заказ добавляется отдельная позиция с good_id, определенном на шаге 2. 
    При необходимости заполняются данные в разделе персонализации `perso`

    5. При комплектации Исполнитель выполняет печать и размещение в заказе требуемых листовок.


    <a name="ownerdep_desc"></a>
    ### Подразделения Заказчика 
    Механизм подразделений Заказчика используется в случае, если Заказчик имеет **более одного аккаунта** 
    в службе доставки или маркетплейсе. 

    По согласованию с Заказчиком Исполнитель создает в системе подразделения Заказчика.
    Подразделение Заказчика имеет идентификатор `ownerdep_id`. 
    Список подразделений можно получить в массиве `ownerdeps` по запросу [Получить настройки  аккаунта (get /settings)](#tag/Nastrojki-akkaunta/operation/common_interface_settings_get)

    Настройка параметров подключения Заказчика к службе доставки или маркетплейсу выполняется Исполнителем индивидуально 
    для каждого подразделения Заказчика. 

    В документе <button popovertarget="popdoc5" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на отгрузку заказов (orders_shipment_task)</button> Заказчик использует атрибут `orders.control.ownerdep_id` для указания
    подразделения, чьи настройки должны быть использованы для обработки заказа.

    При работе с маркетплейсами для подразделений Заказчика используются отдельные аккаунты маркетплейса, 
    которые имеют собственные карточки товара и другие настройки.

    <a name="order_cons_desc"></a>
    ### Консолидация отправлений 
    В отличие от комплектации заказов товарами, размещенными на складе Исполнителя, 
    механизм консолидации предназначен для обработки уже готовых **упакованных заказов**.

    Данные о заказах для консолидации передаются Исполнителем в документе <button popovertarget="popdoc5" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на отгрузку заказов (orders_shipment_task)</button>. 
    В разделе `orders.cons` указывается требуемая информация об отправлении.
    Раздел `orders.goods` не заполняется.
    Остальные разделы заполняются в соответствии с требованиями службы доставки.

    Передаваемые на склад Исполнителя заказы должны быть отмаркированы временными ярлыками.
    На ярлыке должен быть нанесен штрихкод консолидации, переданный в атрибуте `orders.cons.barcode` 
    Штрихкод консолидации должен быть уникальным в пределах всех заказов Исполнителя, 
    включая заказы других Заказчиков. Для этого рекомендуется использовать структуру
    `PPPP+XXXXXX`, где
    * `PPPP` - код Заказчика (partner_id) без лидирующих нулей
    * `XXXXXX` - уникальный номер заказа в системе Заказчика

    Например, `123+2356` `123+AD2356`

    Кроме штрихкода консолидации на временном ярлыке может быть размещена дополнительная информация,
    согласованная с Исполнителем.

    Заказчик должен обеспечить регистрацию заказов для консолидации документом <button popovertarget="popdoc5" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на отгрузку заказов (orders_shipment_task)</button> 
    до их фактического поступления на склад Исполнителя. 
    По согласованию с Заказчиком Исполнитель может выполнять сканирование заказов в момент поступления на склад. 
    На основании этого сканирования создается исходящий документ <button popovertarget="popdoc35" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Приняты отправления для консолидации (exorders_supply)</button>

    Исполнитель выполняет обработку полученных заказов по схеме, аналогичной работе с обычными заказами,
    см. [Процесс обработки заказов](#order_obr_desc).

    <a name="mail_forward_desc"></a>
    ### Пересылка отправлений 
    Суть процесса пересылки отправлений: Заказчик делает заказы для своих клиентов в интернет-магазинах. 
    Интернет-магазины отправляют заказы на склад Исполнителя.
    Исполнитель отправляет полученные заказы клиентам Заказчика. 

    Для организации процесса требуется отдельный аккаунт в системе Исполнителя, который используется исключительно для пересылки отправлений.

    Исполнитель самостоятельно формирует номенклатурный справочник по отправлениям для пересылки.
    Изменение номенклатурного справочника, а также создание заданий на поставку товаров со стороны Заказчика не допускается.

    #### Порядок работы

    1. Заказчик создает заказы на отправку конечному получателю при помощи запроса [Создать заказы  (post /orders)](#tag/Zakazy/operation/common_interface_order_create) или 
    при помощи документа <button popovertarget="popdoc5" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на отгрузку заказов (orders_shipment_task)</button>. 
    <br>В массиве `orders.forwarded_parcels` указывается информация о пересылаемых отправлениях, при этом массив `orders.goods` не заполняется.
    Остальные разделы заполняются в соответствии с требованиями службы доставки.
    <br>Заказы должны быть созданы до момента физического поступления пересылаемых отправлений на склад Исполнителя.

       1.1. Заказы конечного получателя которые содержит только одно отправление для пересылки и атрибут `orders.control.is_fake_order: false` 
       передаются в производство сразу, не дожидаясь фактического поступления на склад отправления для пересылки. 
       При этом создается документ <button popovertarget="popdoc42" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Заказы переданы в производство (orders_production_start)</button>. Дальнейшая обработка таких заказов начинается с пункта 3 [Процесс обработки заказов](#order_obr_desc)

       1.2. Заказы конечного получателя которые содержит два или более отправлений для пересылки обрабатываются 
       по обычной схеме начиная с пункта 2 см. [Процесс обработки заказов](#order_obr_desc).

    2. Исполнитель принимает пересылаемые отправления из интернет-магазина. При этом возможны следующие варианты:
       
       2.1. Заказ конечного получателя содержит только одно отправление для пересылки. 
       <br>В этом случае отправление передается на паллетирование, см. [Процесс обработки заказов](#order_obr_desc) пункт 4.

       2.2. Заказ конечного получателя содержит несколько отправлений для пересылки. 
       <br>В этом случае отправление размещается на складе и ожидает поступления оставшихся отправлений для пересылки.
       Обработка таких заказов происходит по обычной схеме, см. [Процесс обработки заказов](#order_obr_desc) пункт 2.

       2.3. Неизвестное отправление для пересылки. Полученное отправление не отмаркировано штрихкодом, 
       который был передан Заказчиком в заказах конечному получателю `orders.forwarded_parcels.barcode`.
       <br> В этом случае Исполнитель производит описание неизвестного отправления и размещение его на складе.
       Информацию о таких отправлениях Заказчик может получить при помощи запроса [Получить список неизвестных отправлений для пересылки (post /forward/unrecognized)](#tag/Zakazy/operation/common_interface_forward_unrecognized_list).
       На основании полученной информации Заказчик идентифицирует неизвестное отправление и включает его в новый заказ. 
       При этом в качестве штрихкода отправления `orders.forwarded_parcels.barcode` должен быть использован один из штрихкодов,
       полученных в массиве `items.barcodes` запроса [Получить список неизвестных отправлений для пересылки (post /forward/unrecognized)](#tag/Zakazy/operation/common_interface_forward_unrecognized_list).
       <br> По согласованию Исполнитель может отправлять информацию о неизвестных отправлениях на email Заказчика.
       <br> За обработку неизвестных отправлений Исполнителем может взиматься дополнительная плата с Заказчика.

    3. Для информирования Заказчика об отправлениях для пересылки, полученных из интернет-магазина, 
    но не отгруженных конечному получателю (пункты 2.2, 2.3), Исполнитель создает исходящий документ <button popovertarget="popdoc9" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Товары оприходованы (goods_supply)</button>.
    Информацию о всех таких отправлениях можно получить по запросу [Получить текущие остатки товаров  (post /goods/stock)](#tag/Tovary/operation/common_interface_good_stock_cur).   
    Если эти отправления не требуются для пересылки конечному получателю, Заказчик может использовать документ <button popovertarget="popdoc3" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">Задание на отгрузку товаров (goods_shipment_task)</button> 
    для их отгрузки со склада Исполнителя.

    4. Заказчик может отменить созданные заказы при помощи запроса [Отменить заказы  (post /orders/cancel)](#tag/Zakazy/operation/common_interface_order_cancel), см. [Отмена заказов](#order_cancel_desc).
    После отмены заказа отправления для пересылки могут быть использованы при создании новых заказов.

    5. Возвраты заказов, отгруженных конечному получателю, выполняются по согласованию с Исполнителем.

    <a name="marketplaces_desc"></a>
    ## Работа с маркетплейсами
    Исполнитель от лица Заказчика может выполнять следующие действия на маркетплейсе:
    * Получение от маркетплейса заказов клиентов и загрузка их в систему
    * Обмен данными с маркетплейсом, связанный с обработкой заказов клиентов
    * Передача в маркетплейс остатков товаров, доступных для заказа клиентами

    При необходимости возможна работа с несколькими магазинами Заказчика на одном маркетплейсе,
    см. [Подразделения Заказчика](#ownerdep_desc).

    Для подключения к маркетплейсу Заказчик передает Исполнителю данные авторизации на маркетплейсе,
    необходимые Исполнителю для выполнения действий от лица Заказчика. 
    Получить информацию о подключенных маркетплейсах можно при помощи запроса
    [Получить список подключенных маркетплейсов  (get /marketplaces)](#tag/Marketplejsy/operation/common_interface_marketplace_list)


    <a name="marketplace_card_desc"></a>
    ### Карточки товаров на маркетплейсе 
    Для продажи товаров клиентам Заказчик создает карточки товаров на маркетплейсе. 
    Исполнитель загружает в свою систему карточки товаров из подключенных к Заказчику маркетплейсов.

    Получить информацию о загруженных карточках можно при помощи запроса
    [Получить список карточек маркетплейса  (post /marketplaces/cards/list)](#tag/Marketplejsy/operation/common_interface_marketplace_card_list)

    Для корректной работы с маркетплейсом важно установить правильное соответствие между 
    карточками товара на маркетплейсе и товарами Заказчика, находящимися на складе Исполнителя. 
    Для этого по карточке товара загружается следующая информация:
    * `mpcard_id` - Артикул товара на маркетплейсе
    * `mpcard_name` - Название товара на маркетплейсе
    * `mpcard_eans` - Штрих-коды товара на маркетплейсе

    Соответствие складской номенклатуры Заказчика и карточки товара на маркетплейсе выполняется на основании
    1. совпадения артикула товара в FBox `good_id` и артикула товара на маркетплейсе `mpcard_id`
    2. совпадения штрих-кодов товара в FBox `ean` и штрих-кодов товара на маркетплейсе `mpcard_eans`
    3. принудительной установки соответствия между товаром FBox и карточкой маркетплейса

    Возможна установка соответствия между одним артикулом товара FBox и несколькими карточками товара на маркетплейсе и наоборот.

    По карточкам товаров, для которых установлено соответствие, выполняется передача остатков в маркетплейс и получение заказов из маркетплейса.

    Как правило, на маркетплейс передается свободный остаток товара на складе. 
    При необходимости можно изменить это поведение, задав для маркетплейса другую модель передачи остатков (делается по запросу к менеджеру Исполнителя),
    например, `Всегда 0`, `0 если <=1`, `10 если >=10`. 
    Также можно для определенного товара на определенном маркетплейсе установить остаток товара нулевым.

    Получить информацию о карточках маркетплейса, связанных с конкретным товаром, можно при помощи запроса
    [Получить карточки маркетплейса связанные с товаром  (get /goods/{good_id}/marketplaces)](#tag/Tovary/operation/common_interface_good_marketplace_list)

    Получить информацию о товарах, связанных с конкретной карточкой маркетплейса, можно при помощи запроса
    [Получить товары связанные с карточкой маркетплеса  (get /marketplaces/cards/{mpg_id}/goods)](#tag/Marketplejsy/operation/common_interface_marketplace_card_good_list)

    Если имеется расхождение между артикулами или штрих-кодами товаров в FBox и карточками на маркетплейсе,
    откорректировать соответствие товаров можно при помощи запроса [Изменить параметры связи с карточкой товара на маркетплейсе  (post /marketplaces/card)](#tag/Marketplejsy/operation/common_interface_marketplace_card_set)

    <a name="extra_goods_desc"></a>
    ### Сопутствующие товары 
    Для заказов с определенными товарами имеется возможность автоматически добавлять сопутствующие товары.
    Например, при заказе ювелирного изделия добавить подарочную упаковку. 

    Обычно это используется в заказах из маркетплейсов, где у Заказчика нет возможности 
    самостоятельно формировать состав заказа. 

    Для автоматического добавления в состав заказа сопутствующих товаров необходимо установить атрибуты основного товара
    * <button popovertarget="popattr372" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">372 Сопутствующий товар в заказе 1</button>
    * <button popovertarget="popattr373" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">373 Сопутствующий товар в заказе 2</button>
    * <button popovertarget="popattr442" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">442 Сопутствующий товар в заказе 3</button>
    * <button popovertarget="popattr443" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">443 Сопутствующий товар в заказе 4</button>
    * <button popovertarget="popattr444" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">444 Сопутствующий товар в заказе 5</button>
    * <button popovertarget="popattr445" style="font-size:14px; color:#32329f; background-color:transparent; border:none; padding: 1px; text-decoration: underline dotted 1px;">445 Сопутствующий товар в заказе 6</button>

    При передаче в производство в заказ будет автоматически добавляться указанные товары, если они есть в свободном остатке 
    и заказана соответствующая товарная позиция.

    Также имеется возможность безусловного добавления согласованного с Исполнителем списка товаров во все заказы.
