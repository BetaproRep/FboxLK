                    type: string
                    minLength: 2
                    maxLength: 2
                    description: |-
                      Если страна происхождения Германия, необходимо указать землю в соответствии со справочником:
                      * `01` — Schleswig-Holstein (Шлезвиг-Гольштейн)
                      * `02` — Hamburg (Гамбург)
                      * `03` — Niedersachsen (Нижняя Саксония)
                      * `04` — Bremen (Бремен)
                      * `05` — Nordrhein-Westfalen (Северный Рейн-Вестфалия)
                      * `06` — Hessen (Гессен)
                      * `07`— Rheinland-Pfalz (Рейнланд-Пфальц)
                      * `08` — Baden-Württemberg (Баден-Вюртемберг)
                      * `09` — Bayern (Бавария)
                      * `10` — Saarland (Саар)
                      * `11` — Berlin (Берлин)
                      * `12` — Brandenburg (Бранденбург)
                      * `13` — Mecklenburg-Vorpommern (Мекленбург-Передняя Померания)
                      * `14` — Sachsen (Саксония)
                      * `15` — Sachsen-Anhalt (Саксония-Ангальт)
                      * `16` — Thüringen (Тюрингия)

                      Атрибут заполняется только при оформлении экспортной декларации силами Исполнителя
                    title: Земля происхождения товара
                required:
                  - product_name
                  - qnt
                  - weight
                  - product_value_euro
                  - hscode
